// =======================
// HELPERS
// =======================
const fmtMoney = (n) => {
  const v = Math.round(Number(n) || 0);
  const sign = v < 0 ? "-" : "";
  return sign + "$" + Math.abs(v).toLocaleString();
};
const fmtPctSigned = (n) => (n >= 0 ? "+" : "") + Math.round(n) + "%";
const fmtPct = (n) => Math.round(n) + "%";

const loadState = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
};
const saveState = (state) => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); return true; }
  catch { return false; }
};

function KpiCard({ label, value, sub, accent = "#3b82f6", trend, big }) {
  return (
    <div className="relative overflow-hidden rounded-2xl border border-zinc-800 bg-gradient-to-br from-zinc-900 to-zinc-950 p-4">
      <div className="absolute -top-12 -right-12 h-32 w-32 rounded-full opacity-20 blur-2xl" style={{ background: accent }} />
      <div className="relative">
        <div className="text-[10px] uppercase tracking-[0.18em] text-zinc-500 font-medium">{label}</div>
        <div className="mt-2 font-serif tracking-tight" style={{ color: accent, fontSize: big ? "1.85rem" : "1.5rem", lineHeight: 1 }}>{value}</div>
        {sub && <div className="mt-2 text-[10px] text-zinc-400 font-mono">{sub}</div>}
        {trend !== undefined && (
          <div className={"mt-1 inline-flex items-center gap-1 text-[10px] font-semibold " + (trend >= 0 ? "text-emerald-400" : "text-rose-400")}>
            {trend >= 0 ? <I.TrendingUp width={12} height={12} /> : <I.TrendingDown width={12} height={12} />}
            {fmtPctSigned(trend)} vs base
          </div>
        )}
      </div>
    </div>
  );
}

function Slider({ label, value, onChange, min = -50, max = 100, accent }) {
  return (
    <div>
      <div className="flex items-center justify-between mb-2">
        <span className="text-xs uppercase tracking-wider text-zinc-400 font-medium">{label}</span>
        <span className="font-mono text-sm font-semibold" style={{ color: accent }}>{fmtPctSigned(value)}</span>
      </div>
      <input type="range" min={min} max={max} value={value} onChange={(e) => onChange(Number(e.target.value))} className="w-full h-2 bg-zinc-800 rounded-full appearance-none cursor-pointer" style={{ accentColor: accent }} />
      <div className="flex justify-between mt-1 text-[9px] text-zinc-600 font-mono">
        <span>{min}%</span><span>0%</span><span>+{max}%</span>
      </div>
    </div>
  );
}

function ExpenseRow({ exp, onUpdate, onDelete, onMove, isFirst, isLast }) {
  return (
    <div className="flex items-center gap-2 py-2 px-1 sm:px-2 rounded-lg hover:bg-zinc-900/50 group">
      <div className="flex flex-col gap-0.5 flex-shrink-0">
        <button onClick={() => onMove(exp.id, -1)} disabled={isFirst} className="text-zinc-600 hover:text-zinc-300 disabled:opacity-20 p-0.5">
          <I.ChevronUp width={12} height={12} />
        </button>
        <button onClick={() => onMove(exp.id, 1)} disabled={isLast} className="text-zinc-600 hover:text-zinc-300 disabled:opacity-20 p-0.5">
          <I.ChevronDown width={12} height={12} />
        </button>
      </div>
      <input type="text" value={exp.name} onChange={(e) => onUpdate(exp.id, { name: e.target.value })} className="flex-1 min-w-0 bg-transparent text-xs sm:text-sm text-zinc-200 border-0 focus:outline-none focus:bg-zinc-900 rounded px-1.5 py-1" />
      <select value={exp.category} onChange={(e) => onUpdate(exp.id, { category: e.target.value })} className="bg-zinc-900 text-[10px] text-zinc-400 border border-zinc-800 rounded px-1 py-1 max-w-[70px] sm:max-w-none flex-shrink-0">
        {CATEGORY_ORDER.map((c) => <option key={c} value={c}>{c}</option>)}
      </select>
      <div className="flex items-center bg-zinc-900 rounded-lg border border-zinc-800 focus-within:border-blue-500 flex-shrink-0">
        <span className="text-zinc-500 text-xs pl-1.5">$</span>
        <input type="text" inputMode="decimal" value={exp.amount} onChange={(e) => {
          const raw = e.target.value.replace(/[^\d.]/g, "");
          onUpdate(exp.id, { amount: raw === "" ? 0 : Number(raw) });
        }} className="w-16 sm:w-20 bg-transparent text-right font-mono text-xs sm:text-sm text-white border-0 focus:outline-none px-1 py-1" />
      </div>
      <button onClick={() => onDelete(exp.id)} className="text-zinc-600 hover:text-rose-400 p-1 flex-shrink-0">
        <I.Trash width={14} height={14} />
      </button>
    </div>
  );
}

function IncomeRow({ inc, expenseBase, onUpdate, onDelete }) {
  const calcAmount = inc.mode === "percent" ? (expenseBase * (Number(inc.value) || 0)) / 100 : Number(inc.value) || 0;
  const pctOfExpense = expenseBase > 0 ? (calcAmount / expenseBase) * 100 : 0;
  return (
    <div className="rounded-xl border border-zinc-800 bg-zinc-900/30 p-3 group">
      <div className="flex items-center gap-2 mb-2">
        <input type="text" value={inc.name} onChange={(e) => onUpdate(inc.id, { name: e.target.value })} className="flex-1 bg-transparent text-sm font-medium text-white border-0 focus:outline-none focus:bg-zinc-900 rounded px-1 py-0.5" />
        <button onClick={() => onDelete(inc.id)} className="text-zinc-600 hover:text-rose-400">
          <I.Trash width={14} height={14} />
        </button>
      </div>
      <div className="flex items-center gap-2 flex-wrap">
        <div className="flex bg-zinc-900 border border-zinc-800 rounded-lg overflow-hidden text-[10px] font-semibold">
          <button onClick={() => onUpdate(inc.id, { mode: "percent" })} className={"px-2 py-1 " + (inc.mode === "percent" ? "bg-blue-500 text-white" : "text-zinc-400")}>%</button>
          <button onClick={() => onUpdate(inc.id, { mode: "dollar" })} className={"px-2 py-1 " + (inc.mode === "dollar" ? "bg-blue-500 text-white" : "text-zinc-400")}>$</button>
        </div>
        <div className="flex items-center bg-zinc-900 rounded-lg border border-zinc-800 focus-within:border-blue-500">
          {inc.mode === "dollar" && <span className="text-zinc-500 text-sm pl-2">$</span>}
          <input type="text" inputMode="decimal" value={inc.value} onChange={(e) => {
            const raw = e.target.value.replace(/[^\d.]/g, "");
            onUpdate(inc.id, { value: raw === "" ? 0 : Number(raw) });
          }} className="w-16 bg-transparent text-right font-mono text-sm text-white border-0 focus:outline-none px-1.5 py-1" />
          {inc.mode === "percent" && <span className="text-zinc-500 text-sm pr-2">%</span>}
        </div>
        <div className="flex-1 text-right min-w-[100px]">
          <div className="font-mono text-base font-bold text-blue-400">{fmtMoney(calcAmount)}</div>
          <div className="text-[10px] text-zinc-500 font-mono">covers {fmtPct(pctOfExpense)}</div>
        </div>
      </div>
    </div>
  );
}

function Stat({ label, value, accent = "#3b82f6", big }) {
  return (
    <div className="flex items-baseline justify-between gap-2">
      <span className="text-[11px] text-zinc-400">{label}</span>
      <span className={"font-mono font-semibold " + (big ? "text-lg" : "text-sm")} style={{ color: accent }}>{value}</span>
    </div>
  );
}

function CalcCard({ title, accent = "#3b82f6", children, icon }) {
  const Icon = icon;
  return (
    <div className="rounded-2xl border border-zinc-800 bg-zinc-950 p-4">
      <div className="flex items-center gap-2 mb-4">
        {Icon && <Icon width={16} height={16} style={{ color: accent }} />}
        <h3 className="text-sm uppercase tracking-wider font-semibold text-white">{title}</h3>
      </div>
      {children}
    </div>

}

function NumberInput({ value, onChange, prefix = "$", suffix = "" }) {
  return (
    <div className="flex items-center bg-zinc-900 rounded-lg border border-zinc-800 focus-within:border-blue-500 overflow-hidden">
      {prefix && <span className="text-zinc-500 text-sm pl-2.5">{prefix}</span>}
      <input type="text" inputMode="decimal" value={value} onChange={(e) => {
        const raw = e.target.value.replace(/[^\d.]/g, "");
        onChange(raw === "" ? 0 : Number(raw));
      }} className="flex-1 bg-transparent font-mono text-sm text-white border-0 focus:outline-none px-2 py-2 min-w-0" />
      {suffix && <span className="text-zinc-500 text-sm pr-2.5">{suffix}</span>}
    </div>
  );
}

// =======================
// MAIN APP
// =======================
function App() {
  const [expenses, setExpenses] = useState(INITIAL_EXPENSES);
  const [income, setIncome] = useState(INITIAL_INCOME);
  const [expenseAdjust, setExpenseAdjust] = useState(0);
  const [incomeAdjust, setIncomeAdjust] = useState(0);
  const [taxReservePct, setTaxReservePct] = useState(25);
  const [savings, setSavings] = useState(10000);
  const [profitGoal, setProfitGoal] = useState(3000);
  const [calcSales, setCalcSales] = useState(50);
  const [calcCuts, setCalcCuts] = useState(45);
  const [tab, setTab] = useState("overview");
  const [loaded, setLoaded] = useState(false);
  const [saveStatus, setSaveStatus] = useState("Saved");
  const [addedHidden, setAddedHidden] = useState({});

  useEffect(() => {
    const saved = loadState();
    if (saved) {
      if (Array.isArray(saved.expenses)) setExpenses(saved.expenses);
      if (Array.isArray(saved.income)) setIncome(saved.income);
      if (typeof saved.expenseAdjust === "number") setExpenseAdjust(saved.expenseAdjust);
      if (typeof saved.incomeAdjust === "number") setIncomeAdjust(saved.incomeAdjust);
      if (typeof saved.taxReservePct === "number") setTaxReservePct(saved.taxReservePct);
      if (typeof saved.savings === "number") setSavings(saved.savings);
      if (typeof saved.profitGoal === "number") setProfitGoal(saved.profitGoal);
      if (saved.addedHidden) setAddedHidden(saved.addedHidden);
    }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    setSaveStatus("Saving…");
    const t = setTimeout(() => {
      const ok = saveState({ expenses, income, expenseAdjust, incomeAdjust, taxReservePct, savings, profitGoal, addedHidden });
      setSaveStatus(ok ? "Saved" : "Save failed");
    }, 400);
    return () => clearTimeout(t);
  }, [expenses, income, expenseAdjust, incomeAdjust, taxReservePct, savings, profitGoal, addedHidden, loaded]);

  const expenseBase = useMemo(() => expenses.reduce((s, e) => s + (Number(e.amount) || 0), 0), [expenses]);
  const incomeBase = useMemo(() => income.reduce((s, i) => {
    if (i.mode === "percent") return s + (expenseBase * (Number(i.value) || 0)) / 100;
    return s + (Number(i.value) || 0);
  }, 0), [income, expenseBase]);
  const expenseAdj = expenseBase * (1 + expenseAdjust / 100);
  const incomeAdj = incomeBase * (1 + incomeAdjust / 100);
  const netAdj = incomeAdj - expenseAdj;
  const coverageAdj = expenseAdj > 0 ? (incomeAdj / expenseAdj) * 100 : 0;

  const runwayMonths = netAdj >= 0 ? Infinity : savings / Math.max(expenseAdj - incomeAdj, 0.0001);
  const dailyBurn = expenseAdj / 30;
  const weeklyBurn = expenseAdj / 4.33;

  const expensesByCat = useMemo(() => {
    const map = {};
    expenses.forEach((e) => {
      if (!map[e.category]) map[e.category] = [];
      map[e.category].push(e);
    });
    return map;
  }, [expenses]);

  const categoryTotals = useMemo(() => CATEGORY_ORDER.map((cat) => {
    const total = (expensesByCat[cat] || []).reduce((s, e) => s + (Number(e.amount) || 0), 0);
    return { name: cat, value: total, color: CATEGORY_COLORS[cat] || "#6b7280" };
  }).filter((c) => c.value > 0), [expensesByCat]);

  const topExpenses = useMemo(() => [...expenses]
    .sort((a, b) => Number(b.amount) - Number(a.amount))
    .slice(0, 10)
    .map((e) => ({
      name: e.name.length > 22 ? e.name.slice(0, 20) + "…" : e.name,
      amount: Number(e.amount) || 0,
      color: CATEGORY_COLORS[e.category] || "#6b7280",
    })), [expenses]);

  const incomePerStream = useMemo(() => income.map((i) => {
    const amt = i.mode === "percent" ? (expenseBase * (Number(i.value) || 0)) / 100 : Number(i.value) || 0;
    return { name: i.name, value: amt };
  }), [income, expenseBase]);

  // Handlers
  const updateExpense = (id, patch) => setExpenses((arr) => arr.map((e) => (e.id === id ? { ...e, ...patch } : e)));
  const deleteExpense = (id) => setExpenses((arr) => arr.filter((e) => e.id !== id));
  const moveExpense = (id, dir) => setExpenses((arr) => {
    const idx = arr.findIndex((e) => e.id === id);
    if (idx < 0) return arr;
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= arr.length) return arr;
    const copy = [...arr];
    [copy[idx], copy[newIdx]] = [copy[newIdx], copy[idx]];
    return copy;
  });
  const addExpense = (cat = "Often Missed") => {
    const id = "e" + Date.now();
    setExpenses((arr) => [...arr, { id, name: "New expense", amount: 0, category: cat }]);
  };
  const addHiddenExpense = (h, idx) => {
    const id = "h" + Date.now() + "_" + idx;
    setExpenses((arr) => [...arr, { id, name: h.name, amount: h.amount, category: h.category }]);
    setAddedHidden((m) => ({ ...m, [h.category + "-" + h.name]: true }));
  };
  const updateIncome = (id, patch) => setIncome((arr) => arr.map((i) => (i.id === id ? { ...i, ...patch } : i)));
  const deleteIncome = (id) => setIncome((arr) => arr.filter((i) => i.id !== id));
  const addIncome = () => {
    const id = "i" + Date.now();
    setIncome((arr) => [...arr, { id, name: "New income source", mode: "percent", value: 0 }]);
  };
  const resetAll = () => {
    if (!confirm("Reset everything back to the original sheet? Your edits will be lost.")) return;
    setExpenses(INITIAL_EXPENSES);
    setIncome(INITIAL_INCOME);
    setExpenseAdjust(0); setIncomeAdjust(0);
    setTaxReservePct(25); setSavings(10000); setProfitGoal(3000);
    setAddedHidden({});
  };
  const applyPreset = (p) => { setExpenseAdjust(p.expense); setIncomeAdjust(p.income); };

  const tabs = [
    { id: "overview", label: "Overview" },
    { id: "expenses", label: "Expenses" },
    { id: "income", label: "Income" },
    { id: "calc", label: "Calc" },
    { id: "library", label: "Missing" },
  ];

  return (
    <div className="min-h-screen bg-zinc-950 text-zinc-100">
      {/* HEADER */}
      <div className="sticky top-0 z-40 bg-zinc-950/95 backdrop-blur-md border-b border-zinc-800">
        <div className="max-w-7xl mx-auto px-3 sm:px-6 py-3 flex items-center justify-between gap-3">
          <div className="min-w-0">
            <div className="text-[10px] uppercase tracking-[0.18em] text-blue-400 font-semibold">Townes Financial Ops · Decatur, GA</div>
            <h1 className="text-xl sm:text-2xl text-white truncate font-serif">G's Command Center</h1>
          </div>
          <div className="flex items-center gap-2 flex-shrink-0">
            <div className={"text-[10px] font-mono hidden sm:block " + (saveStatus === "Saved" ? "text-emerald-400" : saveStatus === "Saving…" ? "text-amber-400" : "text-rose-400")}>
              ● {saveStatus}
            </div>
            <button onClick={resetAll} className="px-2.5 py-1.5 text-[11px] font-medium text-zinc-400 hover:text-white border border-zinc-800 rounded-lg hover:border-zinc-700">
              <I.Reset width={12} height={12} className="inline mr-1" />Reset
            </button>
          </div>
        </div>
        <div className="max-w-7xl mx-auto px-3 sm:px-6 flex gap-1 overflow-x-auto no-scrollbar">
          {tabs.map((t) => (
            <button key={t.id} onClick={() => setTab(t.id)} className={"px-3 py-2 text-xs font-semibold rounded-t-md whitespace-nowrap " + (tab === t.id ? "text-white border-b-2 border-blue-500" : "text-zinc-500 hover:text-zinc-200 border-b-2 border-transparent")}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      <div className="max-w-7xl mx-auto px-3 sm:px-6 py-4 space-y-5">
        {/* KPIs */}
        <div className="grid grid-cols-2 lg:grid-cols-4 gap-2.5">
          <KpiCard label="Monthly Expenses" value={fmtMoney(expenseAdj)} accent="#ef4444" sub={"Base: " + fmtMoney(expenseBase)} trend={expenseAdjust} big />
          <KpiCard label="Monthly Income" value={fmtMoney(incomeAdj)} accent="#3b82f6" sub={"Base: " + fmtMoney(incomeBase)} trend={incomeAdjust} big />
          <KpiCard label="Net Position" value={fmtMoney(netAdj)} accent={netAdj >= 0 ? "#b8ff00" : "#fb7185"} sub={netAdj >= 0 ? "Surplus" : "Deficit"} big />
          <KpiCard label="Coverage" value={fmtPct(coverageAdj)} accent={coverageAdj >= 100 ? "#b8ff00" : "#f59e0b"} sub={coverageAdj >= 100 ? "Fully covered" : "Income gap"} big />
        </div>

        {/* TAB CONTENT */}
        {tab === "overview" && <OverviewTab {...{ expenseAdjust, setExpenseAdjust, incomeAdjust, setIncomeAdjust, categoryTotals, topExpenses, incomePerStream, expenseBase, incomeBase, applyPreset, dailyBurn, weeklyBurn }} />}
        {tab === "expenses" && <ExpensesTab {...{ expensesByCat, updateExpense, deleteExpense, moveExpense, addExpense, expenseBase }} />}
        {tab === "income" && <IncomeTab {...{ income, expenseBase, incomeBase, updateIncome, deleteIncome, addIncome }} />}
        {tab === "calc" && <CalculatorsTab {...{ expenseAdj, incomeAdj, netAdj, taxReservePct, setTaxReservePct, savings, setSavings, profitGoal, setProfitGoal, calcSales, setCalcSales, calcCuts, setCalcCuts, runwayMonths, dailyBurn }} />}
        {tab === "library" && <LibraryTab {...{ addHiddenExpense, addedHidden }} />}

        <div className="pt-6 pb-12 text-center">
          <div className="text-[10px] text-zinc-600 font-mono">Built for G · saves locally on this device</div>
        </div>
      </div>
    </div>
  );
}

function ExpensesTab({ expensesByCat, updateExpense, deleteExpense, moveExpense, addExpense, expenseBase }) {

  const toggleCat = (c) => setCollapsedCats((m) => ({ ...m, [c]: !m[c] }));
  const usedCats = CATEGORY_ORDER.filter((c) => expensesByCat[c] && expensesByCat[c].length > 0);

  return (
    <div className="space-y-3">
      <div className="rounded-xl border border-blue-900/50 bg-blue-950/20 p-3 flex items-start gap-2">

        <div className="text-xs text-blue-100 leading-relaxed">

        const total = items.reduce((s, e) => s + (Number(e.amount) || 0), 0);

              <div className="font-serif text-xl" style={{ color: CATEGORY_COLORS[cat] || "#fff" }}>{fmtMoney(total)}</div>

              <div className="px-2 pb-2 border-t border-zinc-900">

      </button>
    </div>
  );
}

function CalculatorsTab({ expenseAdj, incomeAdj, netAdj, taxReservePct, setTaxReservePct, savings, setSavings, profitGoal, setProfitGoal, calcSales, setCalcSales, calcCuts, setCalcCuts, runwayMonths, dailyBurn }) {
  const breakEvenMonthly = expenseAdj / (1 - taxReservePct / 100);
  const taxOwed = breakEvenMonthly * (taxReservePct / 100);
  const breakEvenDaily = breakEvenMonthly / 30;
  const breakEvenWeekly = breakEvenMonthly / 4.33;
  const gap = Math.max(expenseAdj - incomeAdj, 0);
  const gapIncreasePct = incomeAdj > 0 ? (gap / incomeAdj) * 100 : 0;
  const profitTargetIncome = (expenseAdj + profitGoal) / (1 - taxReservePct / 100);
  const runwayDisplay = runwayMonths === Infinity || netAdj >= 0 ? "∞" : runwayMonths.toFixed(1) + " mo";

  return (
    <div className="grid md:grid-cols-2 gap-3">
      <CalcCard title="Break-Even with Taxes" accent="#3b82f6" icon={I.Target}>
        <div className="space-y-3">
          <div>
            <label className="text-[10px] uppercase tracking-wider text-zinc-500 block mb-1">Tax Reserve %</label>
            <NumberInput value={taxReservePct} onChange={setTaxReservePct} prefix="" suffix="%" />
            <div className="text-[10px] text-zinc-500 mt-1 font-mono">IRS + GA state. Typical: 25–30%.</div>
          </div>
          <div className="border-t border-zinc-800 pt-3 space-y-1.5">
            <Stat label="Gross monthly revenue needed" value={fmtMoney(breakEvenMonthly)} accent="#3b82f6" big />
            <Stat label="Set aside for taxes" value={fmtMoney(taxOwed)} accent="#f97316" />
            <Stat label="Net after taxes" value={fmtMoney(breakEvenMonthly - taxOwed)} accent="#10b981" />
            <div className="border-t border-zinc-800 pt-2 mt-2 grid grid-cols-2 gap-2">
              <Stat label="Per day" value={fmtMoney(breakEvenDaily)} accent="#3b82f6" />
              <Stat label="Per week" value={fmtMoney(breakEvenWeekly)} accent="#3b82f6" />
            </div>
          </div>
        </div>
      </CalcCard>

      <CalcCard title="Coverage Gap Closer" accent="#f59e0b" icon={I.Alert}>
        {gap > 0 ? (
          <div className="space-y-3">
            <div>
              <div className="text-[10px] uppercase tracking-wider text-zinc-500">Monthly shortfall</div>
              <div className="font-serif text-3xl text-amber-400">{fmtMoney(gap)}</div>
            </div>
            <div className="border-t border-zinc-800 pt-3 space-y-1.5">
              <Stat label="% income lift needed" value={fmtPct(gapIncreasePct)} accent="#f59e0b" />
              <Stat label="Extra/day" value={fmtMoney(gap / 30)} accent="#f59e0b" />
              <Stat label="Extra/week" value={fmtMoney(gap / 4.33)} accent="#f59e0b" />
            </div>
            <div className="border-t border-zinc-800 pt-3">
              <div className="text-[10px] uppercase tracking-wider text-zinc-500 mb-2">Ways to close it</div>
              <div className="space-y-2 text-xs">
                <div className="flex items-center justify-between gap-2">
                  <span className="text-zinc-400 flex items-center gap-1">Cuts @ $<input type="text" inputMode="decimal" value={calcCuts} onChange={(e) => { const r = e.target.value.replace(/[^\d.]/g, ""); setCalcCuts(r === "" ? 0 : Number(r)); }} className="w-12 bg-zinc-900 border border-zinc-800 rounded px-1 text-white text-xs" /></span>
                  <span className="font-mono text-blue-400 font-semibold">{calcCuts > 0 ? Math.ceil(gap / calcCuts) : 0} cuts/mo</span>
                </div>
                <div className="flex items-center justify-between gap-2">
                  <span className="text-zinc-400 flex items-center gap-1">FB sales @ $<input type="text" inputMode="decimal" value={calcSales} onChange={(e) => { const r = e.target.value.replace(/[^\d.]/g, ""); setCalcSales(r === "" ? 0 : Number(r)); }} className="w-12 bg-zinc-900 border border-zinc-800 rounded px-1 text-white text-xs" /></span>
                  <span className="font-mono text-blue-400 font-semibold">{calcSales > 0 ? Math.ceil(gap / calcSales) : 0} sales/mo</span>
                </div>
              </div>
            </div>
          </div>
        ) : (
          <div className="py-6 text-center">
            <I.Check width={40} height={40} className="text-emerald-400 mx-auto mb-2" />
            <div className="text-sm font-semibold text-emerald-400">No gap — income covers expenses</div>
            <div className="text-xs text-zinc-500 mt-1">Surplus: {fmtMoney(-1 * (expenseAdj - incomeAdj))}</div>
          </div>
        )}
      </CalcCard>

      <CalcCard title="Profit Target" accent="#b8ff00" icon={I.TrendingUp}>
        <div className="space-y-3">
          <div>
            <label className="text-[10px] uppercase tracking-wider text-zinc-500 block mb-1">Profit you want to take home</label>
            <NumberInput value={profitGoal} onChange={setProfitGoal} />
          </div>
          <div className="border-t border-zinc-800 pt-3 space-y-1.5">
            <Stat label="Gross revenue needed" value={fmtMoney(profitTargetIncome)} accent="#b8ff00" big />
            <Stat label="Above current income" value={fmtMoney(Math.max(profitTargetIncome - incomeAdj, 0))} accent="#f59e0b" />
            <Stat label="% lift needed" value={incomeAdj > 0 ? fmtPct(Math.max(((profitTargetIncome - incomeAdj) / incomeAdj) * 100, 0)) : "—"} accent="#f59e0b" />
          </div>
        </div>
      </CalcCard>

      <CalcCard title="Cash Runway" accent="#a855f7" icon={I.Shield}>
        <div className="space-y-3">
          <div>
            <label className="text-[10px] uppercase tracking-wider text-zinc-500 block mb-1">Current cash savings</label>
            <NumberInput value={savings} onChange={setSavings} />
          </div>
          <div className="border-t border-zinc-800 pt-3 space-y-1.5">
            <Stat label="Months at current burn" value={runwayDisplay} accent={netAdj >= 0 ? "#b8ff00" : runwayMonths < 3 ? "#ef4444" : "#a855f7"} big />
            <Stat label="Net monthly cash flow" value={fmtMoney(netAdj)} accent={netAdj >= 0 ? "#10b981" : "#ef4444"} />
            <Stat label="6-month emergency fund" value={fmtMoney(expenseAdj * 6)} accent="#a855f7" />
            <Stat label="Gap to recommended" value={fmtMoney(Math.max(expenseAdj * 6 - savings, 0))} accent="#f59e0b" />
          </div>
        </div>
      </CalcCard>

      <CalcCard title="12-Month Trajectory" accent="#06b6d4" icon={I.TrendingUp}>
        <div className="space-y-1.5">
          <Stat label="Annual expenses" value={fmtMoney(expenseAdj * 12)} accent="#ef4444" />
          <Stat label="Annual income" value={fmtMoney(incomeAdj * 12)} accent="#3b82f6" />
          <Stat label="Annual net" value={fmtMoney(netAdj * 12)} accent={netAdj >= 0 ? "#10b981" : "#ef4444"} big />
          <Stat label={"Tax reserve (" + taxReservePct + "%)"} value={fmtMoney(incomeAdj * 12 * (taxReservePct / 100))} accent="#f97316" />
          <Stat label="Net after tax reserve" value={fmtMoney(netAdj * 12 - incomeAdj * 12 * (taxReservePct / 100))} accent={(netAdj * 12 - incomeAdj * 12 * (taxReservePct / 100)) >= 0 ? "#b8ff00" : "#ef4444"} />
        </div>
      </CalcCard>

      <CalcCard title="Daily Hustle" accent="#ec4899" icon={I.Zap}>
        <div className="space-y-1.5">
          <Stat label="Burn per day" value={fmtMoney(dailyBurn)} accent="#ef4444" />
          <Stat label="Income per day" value={fmtMoney(incomeAdj / 30)} accent="#3b82f6" />
          <Stat label="Net per day" value={fmtMoney(netAdj / 30)} accent={netAdj >= 0 ? "#10b981" : "#ef4444"} big />
          <div className="border-t border-zinc-800 pt-2 mt-2">
            <div className="text-[10px] uppercase tracking-wider text-zinc-500 mb-1">One week of dry powder</div>
            <div className="font-serif text-xl text-rose-400">{fmtMoney(expenseAdj / 4.33)}</div>
          </div>
        </div>
      </CalcCard>
    </div>
  );
}

function LibraryTab({ addHiddenExpense, addedHidden }) {
  const grouped = useMemo(() => {
    const map = {};
    HIDDEN_EXPENSES.forEach((h) => {
      if (!map[h.category]) map[h.category] = [];
      map[h.category].push(h);
    });
    return map;
  }, []);

  return (
    <div className="space-y-4">
      <div className="rounded-2xl border border-amber-900/50 bg-amber-950/20 p-4 flex items-start gap-3">
        <I.Warning width={20} height={20} className="text-amber-400 mt-0.5 flex-shrink-0" />
        <div>
          <h3 className="text-sm font-bold text-white mb-1">Expenses Most Operators Forget</h3>
          <p className="text-xs text-amber-100 leading-relaxed">
            Audit of line items that quietly drain real businesses. Tap any to add it to your sheet with a suggested amount — edit after.
          </p>
        </div>
      </div>

      {CATEGORY_ORDER.filter((c) => grouped[c]).map((cat) => {
        const items = grouped[cat];
        const subtotal = items.reduce((s, i) => s + i.amount, 0);
        return (
          <div key={cat} className="rounded-2xl border border-zinc-800 bg-zinc-950 overflow-hidden">
            <div className="flex items-center gap-3 p-3 border-b border-zinc-900">
              <div className="w-1 h-7 rounded-full flex-shrink-0" style={{ background: CATEGORY_COLORS[cat] || "#6b7280" }} />
              <div className="flex-1">
                <div className="text-sm font-semibold text-white">{cat}</div>
                <div className="text-[10px] text-zinc-500 font-mono">{items.length} items · ~{fmtMoney(subtotal)}/mo total</div>
              </div>
            </div>
            <div className="divide-y divide-zinc-900">
              {items.map((h, idx) => {
                const key = h.category + "-" + h.name;
                const added = addedHidden[key];
                return (
                  <div key={idx} className="flex items-start gap-3 p-3 hover:bg-zinc-900/30">
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-medium text-zinc-100">{h.name}</div>
                      <div className="text-[10px] text-zinc-400 mt-0.5 leading-relaxed">{h.tip}</div>
                    </div>
                    <div className="text-right flex-shrink-0">
                      <div className="font-mono text-sm font-semibold" style={{ color: CATEGORY_COLORS[cat] }}>~{fmtMoney(h.amount)}</div>
                      <button onClick={() => addHiddenExpense(h, idx)} disabled={added} className={"mt-1 px-2 py-1 text-[10px] font-bold rounded " + (added ? "bg-emerald-900/50 text-emerald-400" : "bg-blue-600 text-white hover:bg-blue-500")}>
                        {added ? <><I.Check width={12} height={12} className="inline" /> Added</> : <><I.Plus width={12} height={12} className="inline" /> Add</>}
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
