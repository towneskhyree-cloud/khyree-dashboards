function Icon({ name, size = 20, color = "currentColor", strokeWidth = 2, style }) {
  const data = ICON_PATHS[name];
  if (!data) return null;
  const parts = data.split('|').map((p, i) => {
    if (p.startsWith('C:')) {
      const [cx, cy, r] = p.slice(2).split(',').map(Number);
      return <circle key={i} cx={cx} cy={cy} r={r}/>;
    }
    if (p.startsWith('R:')) {
      const [x, y, w, h, rx, ry] = p.slice(2).split(',').map(Number);
      return <rect key={i} x={x} y={y} width={w} height={h} rx={rx || 0} ry={ry || 0}/>;
    }
    return <path key={i} d={p}/>;
  });
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
      viewBox="0 0 24 24" fill="none" stroke={color}
      strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"
      style={style}>
      {parts}
    </svg>
  );
}

                <div style={{
                  width: 28, height: 28, borderRadius: 8,
                  background: group.color + "1A", color: group.color,
                  display: "flex", alignItems: "center", justifyContent: "center"
                }}>
                  <Icon name={group.icon} size={14}/>
                </div>
                <div className="font-display" style={{
                  fontSize: 15, fontWeight: 600, color: C.ink, flex: 1
                }}>
                  {group.name}
                </div>
                <div className="font-body num" style={{
                  fontSize: 11.5, color: C.muted, fontWeight: 600
                }}>
                  {groupChecked}/{group.questions.length}
                </div>
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {group.questions.map((q, i) => {
                  const key = group.id + "_" + i;
                  const isChecked = !!checked[key];
                  return (
                    <button key={i} onClick={() => toggle(key)} style={{
                      background: isChecked ? group.color + "0E" : C.card,
                      border: "1px solid " + (isChecked ? group.color + "44" : C.line),
                      borderRadius: 10,
                      padding: "11px 12px",
                      cursor: "pointer", textAlign: "left",
                      display: "flex", gap: 11, alignItems: "flex-start",
                      transition: "all 0.15s"
                    }}>
                      <div className={isChecked ? "checkbox checked" : "checkbox"} style={{
                        background: isChecked ? group.color : "#fff",
                        borderColor: isChecked ? group.color : C.line
                      }}>
                        {isChecked && <Icon name="Check" size={14} color="#fff"/>}
                      </div>
                      <div className="font-body" style={{
                        fontSize: 12.5, color: isChecked ? C.muted : C.ink,
                        lineHeight: 1.5,
                        textDecoration: isChecked ? "line-through" : "none",
                        paddingTop: 2
                      }}>
                        {q}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Share Modal ───────────────────────────────────────────
function ShareModal({ checked, onClose }) {
  const [copied, setCopied] = useState(false);
  const [shared, setShared] = useState(false);
  const totalChecked = Object.values(checked).filter(Boolean).length;
  const pct = TOTAL_QUESTIONS > 0 ? Math.round((totalChecked / TOTAL_QUESTIONS) * 100) : 0;

  const exportText = useMemo(() => {
    let out = "════════════════════════════════════\n";
    out += "TOWNES MASTER PLAN · PROGRESS\n";
    out += "Snapshot " + new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" }) + "\n";
    out += "════════════════════════════════════\n\n";
    out += "MONTHLY MATH:\n";
    out += "  Income:   +$9,000\n";
    out += "  Expense:  -$7,200\n";
    out += "  Leftover: +$1,800\n\n";

    out += "TEAM PLAN: DIY Year One until KC clears $5K/mo for 3 months.\n\n";

    out += "CHECKLIST PROGRESS: " + totalChecked + "/" + TOTAL_QUESTIONS + " (" + pct + "%)\n\n";

    QUESTION_GROUPS.forEach(group => {
      const groupChecked = group.questions.filter((_, i) => checked[group.id + "_" + i]).length;
      out += "━━━ " + group.name.toUpperCase() + " — " + groupChecked + "/" + group.questions.length + " ━━━\n";
      group.questions.forEach((q, i) => {
        const isChecked = !!checked[group.id + "_" + i];
        out += "  " + (isChecked ? "[x]" : "[ ]") + " " + q + "\n";
      });
      out += "\n";
    });

    out += "════════════════════════════════════\n";
    return out;
  }, [checked, totalChecked, pct]);

  const handleCopy = async () => {
    try {
      await navigator.clipboard.writeText(exportText);
      setCopied(true);
      setTimeout(() => setCopied(false), 2200);
    } catch {
      const ta = document.getElementById("export-ta");
      if (ta) { ta.select(); document.execCommand("copy"); setCopied(true); setTimeout(() => setCopied(false), 2200); }
    }
  };

  const handleShare = async () => {
    if (navigator.share) {
      try {
        await navigator.share({
          title: "Townes Master Plan",
          text: exportText
        });
        setShared(true);
        setTimeout(() => setShared(false), 2200);
      } catch {}
    }
  };

  const canShare = typeof navigator !== 'undefined' && !!navigator.share;

  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0,
      background: "rgba(27,25,22,0.65)", backdropFilter: "blur(6px)",
      zIndex: 1000, display: "flex",
      alignItems: "center", justifyContent: "center", padding: 16
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: C.cream, borderRadius: 18,
        maxWidth: 720, width: "100%", maxHeight: "90vh",
        display: "flex", flexDirection: "column", overflow: "hidden",
        boxShadow: "0 24px 80px rgba(0,0,0,0.45)"
      }}>
        <div style={{
          padding: "20px 24px", borderBottom: "1px solid " + C.line,
          display: "flex", alignItems: "center", justifyContent: "space-between"
        }}>
          <div>
            <div className="font-body" style={{
              fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase",
              color: C.gold, fontWeight: 600, marginBottom: 4
            }}>
              Plan Snapshot
            </div>
            <div className="font-display" style={{
              fontSize: 22, fontWeight: 500, color: C.ink, letterSpacing: "-0.01em"
            }}>
              Share with your wife
            </div>
          </div>
          <button onClick={onClose} style={{
            width: 36, height: 36, borderRadius: 9,
            background: "transparent", border: "1px solid " + C.line,
            cursor: "pointer", display: "flex",
            alignItems: "center", justifyContent: "center", color: C.muted
          }}>
            <Icon name="X" size={16}/>
          </button>
        </div>

        <div style={{ padding: "14px 24px", background: C.greenLt, borderBottom: "1px solid " + C.line }}>
          <div className="font-body" style={{ fontSize: 13, color: C.greenDk, lineHeight: 1.55 }}>
            Tap <strong>Share</strong> for iMessage/AirDrop/Mail. Or <strong>Copy</strong> to paste anywhere.
          </div>
        </div>

        <div style={{ flex: 1, overflow: "auto", padding: "16px 24px" }}>
          <textarea id="export-ta" readOnly value={exportText}
            onClick={e => e.target.select()} style={{
              width: "100%", minHeight: 220, maxHeight: "40vh",
              padding: "14px 16px", background: C.paper,
              border: "1px solid " + C.line, borderRadius: 10,
              fontFamily: "ui-monospace, Menlo, monospace",
              fontSize: 11.5, lineHeight: 1.6,
              color: C.ink, resize: "vertical"
            }}/>
        </div>

        <div style={{ padding: "16px 24px 20px", borderTop: "1px solid " + C.line,
          display: "flex", flexDirection: "column", gap: 10 }}>
          {canShare && (
            <button onClick={handleShare} className="font-body" style={{
              width: "100%", padding: "14px 20px",
              background: C.green, color: "#fff",
              border: "none", borderRadius: 11,
              fontSize: 15, fontWeight: 600, cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center", gap: 8
            }}>
              {shared ? <><Icon name="Check" size={18}/> Shared</> : <><Icon name="Send" size={18}/> Share — iMessage, AirDrop, Mail</>}
            </button>
          )}
          <button onClick={handleCopy} className="font-body" style={{
            width: "100%", padding: "14px 20px",
            background: copied ? C.green : C.ink,
            color: copied ? "#fff" : C.cream,
            border: "none", borderRadius: 11,
            fontSize: 15, fontWeight: 600, cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center", gap: 8
          }}>
            {copied ? <><Icon name="Check" size={18}/> Copied</> : <><Icon name="Copy" size={18}/> Copy snapshot</>}
          </button>
        </div>
      </div>
    </div>
  );
}
