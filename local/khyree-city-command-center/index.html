<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khyree City · Operator Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #0a0a0c; color: #fafafa; font-family: 'Geist', system-ui, sans-serif; min-height: 100vh; }
    * { box-sizing: border-box; }
    #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 24px; background: #0a0a0c; z-index: 9999; transition: opacity 0.4s; }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loading-bar { width: 280px; height: 2px; background: #27272d; border-radius: 2px; overflow: hidden; position: relative; }
    .loading-bar::after { content: ''; position: absolute; left: 0; top: 0; width: 40%; height: 100%; background: #b8ff00; animation: load 1.4s ease-in-out infinite; }
    @keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
    #loading .label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #6b6b73; letter-spacing: 0.2em; text-align: center; max-width: 600px; }
    #loading h2 { font-family: 'Bricolage Grotesque', sans-serif; font-size: 26px; font-weight: 800; margin: 0; color: #fafafa; letter-spacing: -0.03em; }
    #loading h2 .accent { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; color: #f5e6c8; }
    #loading h2 .kc { color: #b8ff00; }
    #error-display { display: none; position: fixed; inset: 0; padding: 40px; background: #0a0a0c; z-index: 10000; overflow: auto; }
    #error-display.visible { display: block; }
    #error-display h1 { color: #ef4444; font-family: 'Bricolage Grotesque', sans-serif; font-size: 24px; margin: 0 0 16px; }
    #error-display p { color: #a1a1a8; font-size: 14px; line-height: 1.6; margin: 8px 0; max-width: 700px; }
    #error-display strong { color: #fafafa; }
    #error-display pre { background: #111114; border: 1px solid #27272d; border-radius: 4px; padding: 16px; color: #fafafa; font-family: 'JetBrains Mono', monospace; font-size: 12px; overflow: auto; white-space: pre-wrap; word-wrap: break-word; line-height: 1.5; max-width: 1000px; }
    #error-display .error-section { margin-top: 16px; }
    #error-display .error-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #6b6b73; letter-spacing: 0.15em; margin-bottom: 6px; }
    .mobile-warning { display: none; padding: 12px 16px; background: #16161b; border-bottom: 1px solid #27272d; font-size: 11px; color: #f59e0b; text-align: center; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em; }
    @media (max-width: 900px) { .mobile-warning { display: block; } }
    .display-font { font-family: 'Bricolage Grotesque', sans-serif; letter-spacing: -0.02em; }
    .mono-font { font-family: 'JetBrains Mono', monospace; }
    .serif-italic { font-family: 'Instrument Serif', serif; font-style: italic; }
    .grain { background-image: radial-gradient(circle at 1px 1px, rgba(184,255,0,0.018) 1px, transparent 0); background-size: 24px 24px; }
    input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; background: #3a3a42; border-radius: 2px; outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; background: #b8ff00; border-radius: 50%; cursor: pointer; border: 2px solid #0a0a0c; box-shadow: 0 0 0 1px #b8ff00, 0 0 12px rgba(184,255,0,0.5); transition: transform 0.15s; }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; background: #b8ff00; border-radius: 50%; cursor: pointer; border: 2px solid #0a0a0c; }
    .tab-btn { transition: all 0.2s; }
    .tab-btn:hover { background: #1c1c22; color: #fafafa; }
    .stat-card { transition: transform 0.2s, border-color 0.2s; }
    .stat-card:hover { transform: translateY(-2px); border-color: #3a3a42; }
    @media (max-width: 1100px) {
      .main-grid { grid-template-columns: 1fr !important; }
      .hero-strip { grid-template-columns: repeat(3, 1fr) !important; }
    }
    @media (max-width: 700px) {
      .hero-strip { grid-template-columns: repeat(2, 1fr) !important; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <h2><span class="kc">Khyree City</span> <span class="accent">Command</span></h2>
    <div class="loading-bar"></div>
    <div class="label" id="loading-label">LOADING…</div>
  </div>
  <div id="error-display">
    <h1>Dashboard failed to load</h1>
    <p>Something went wrong while initializing. Details below.</p>
    <p><strong>Most common fixes:</strong> refresh · check internet · try Chrome</p>
    <div class="error-section">
      <div class="error-label">ERROR MESSAGE</div>
      <pre id="error-message">—</pre>
    </div>
    <div class="error-section">
      <div class="error-label">DIAGNOSTIC</div>
      <pre id="error-diagnostic">—</pre>
    </div>
    <div class="error-section">
      <div class="error-label">STACK TRACE</div>
      <pre id="error-stack">—</pre>
    </div>
  </div>
  <div class="mobile-warning">⚠ FOR FULL EXPERIENCE, OPEN ON A LAPTOP OR IPAD</div>
  <div id="root"></div>

  <script>
    function showError(title, message, stack, diagnostic) {
      try {
        var loader = document.getElementById('loading');
        if (loader) loader.style.display = 'none';
        var err = document.getElementById('error-display');
        var msgEl = document.getElementById('error-message');
        var stackEl = document.getElementById('error-stack');
        var diagEl = document.getElementById('error-diagnostic');
        if (msgEl) msgEl.textContent = message || '(no message)';
        if (stackEl) stackEl.textContent = stack || '(no stack)';
        if (diagEl) diagEl.textContent = diagnostic || '(no diagnostic)';
        if (err) err.classList.add('visible');
      } catch(_) {
        document.body.innerHTML = '<div style="padding:40px;color:#fff;font-family:monospace"><h1 style="color:#ef4444">Error</h1><pre>' + 
          (message || '') + '\n\n' + (stack || '') + '\n\n' + (diagnostic || '') + '</pre></div>';
      }
    }
    function getDiagnostic() {
      return [
        'React loaded: ' + (typeof React !== 'undefined' ? 'YES (v' + (React.version || '?') + ')' : 'NO'),
        'ReactDOM loaded: ' + (typeof ReactDOM !== 'undefined' ? 'YES' : 'NO'),
        'PropTypes loaded: ' + (typeof PropTypes !== 'undefined' ? 'YES' : 'NO'),
        'Recharts loaded: ' + (typeof Recharts !== 'undefined' ? 'YES' : 'NO'),
        'createRoot available: ' + (typeof ReactDOM !== 'undefined' && typeof ReactDOM.createRoot === 'function' ? 'YES' : 'NO'),
        'User Agent: ' + navigator.userAgent,
        'URL: ' + location.href,
      ].join('\n');
    }
    function updateLoadingLabel(text) {
      var l = document.getElementById('loading-label');
      if (l) l.textContent = text;
    }
    window.addEventListener('error', function(e) {
      var msg = (e.error && e.error.message) || e.message || 'Unknown error';
      var stack = (e.error && e.error.stack) || '(no stack)';
      showError('Error', msg, stack, getDiagnostic());
    });
    var cdnsLoaded = 0;
    var totalCdns = 4;
    function onCdnLoad(name) {
      cdnsLoaded++;
      updateLoadingLabel('LOADING LIBRARIES… ' + cdnsLoaded + '/' + totalCdns + ' (' + name + ')');
      if (cdnsLoaded === totalCdns) {
        updateLoadingLabel('STARTING COMMAND CENTER…');
        setTimeout(startApp, 50);
      }
    }
    function onCdnFail(name, url) {
      showError('CDN load failed', 'Failed to load ' + name + ' from ' + url, '', getDiagnostic());
    }
    function startApp() {
      try {
        if (typeof React === 'undefined') { showError('Library missing', 'React did not load', '', getDiagnostic()); return; }
        if (typeof ReactDOM === 'undefined') { showError('Library missing', 'ReactDOM did not load', '', getDiagnostic()); return; }
        if (typeof Recharts === 'undefined') { showError('Library missing', 'Recharts did not load', '', getDiagnostic()); return; }
        if (typeof ReactDOM.createRoot !== 'function') { showError('Wrong React version', 'createRoot not available', '', getDiagnostic()); return; }
        runApp();
      } catch(e) {
        showError(e.name || 'Error', e.message || String(e), e.stack || '(no stack)', getDiagnostic());
      }
    }
  </script>
