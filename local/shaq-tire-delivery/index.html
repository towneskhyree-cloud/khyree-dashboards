<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHAQ'S Tire Delivery · Operations Command</title>
  <meta name="description" content="Live financial model for SHAQ's tire delivery box truck operation.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #0a0a0c; color: #fafafa; font-family: 'Geist', system-ui, sans-serif; min-height: 100vh; }
    * { box-sizing: border-box; }
    #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 24px; background: #0a0a0c; z-index: 9999; transition: opacity 0.4s; }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loading-bar { width: 280px; height: 2px; background: #27272d; border-radius: 2px; overflow: hidden; position: relative; }
    .loading-bar::after { content: ''; position: absolute; left: 0; top: 0; width: 40%; height: 100%; background: #3b82f6; animation: load 1.4s ease-in-out infinite; }
    @keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
    #loading .label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #6b6b73; letter-spacing: 0.2em; }
    #loading h2 { font-family: 'Bricolage Grotesque', sans-serif; font-size: 22px; font-weight: 700; margin: 0; color: #fafafa; letter-spacing: -0.02em; }
    #loading h2 .accent { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; color: #f5e6c8; }
    .mobile-warning { display: none; padding: 12px 16px; background: #16161b; border-bottom: 1px solid #27272d; font-size: 11px; color: #f59e0b; text-align: center; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em; }
    @media (max-width: 900px) { .mobile-warning { display: block; } }
    .display-font { font-family: 'Bricolage Grotesque', sans-serif; letter-spacing: -0.02em; }
    .mono-font { font-family: 'JetBrains Mono', monospace; }
    .serif-italic { font-family: 'Instrument Serif', serif; font-style: italic; }
    .grain { background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.015) 1px, transparent 0); background-size: 24px 24px; }
    input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; background: #3a3a42; border-radius: 2px; outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; background: #3b82f6; border-radius: 50%; cursor: pointer; border: 2px solid #0a0a0c; box-shadow: 0 0 0 1px #3b82f6, 0 0 12px rgba(59,130,246,0.5); transition: transform 0.15s; }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; background: #3b82f6; border-radius: 50%; cursor: pointer; border: 2px solid #0a0a0c; }
    .tab-btn { transition: all 0.2s; }
    .tab-btn:hover { background: #1c1c22; color: #fafafa; }
    .stat-card { transition: transform 0.2s, border-color 0.2s; }
    .stat-card:hover { transform: translateY(-2px); border-color: #3a3a42; }
    @media (max-width: 1100px) {
      .main-grid { grid-template-columns: 1fr !important; }
      .hero-strip { grid-template-columns: repeat(2, 1fr) !important; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <h2>SHAQ'S <span class="accent">Tire Delivery</span></h2>
    <div class="loading-bar"></div>
    <div class="label">INITIALIZING COMMAND CENTER…</div>
  </div>
  <div class="mobile-warning">⚠ FOR FULL EXPERIENCE, OPEN ON A LAPTOP OR IPAD</div>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script src="https://unpkg.com/@babel/standalone@7.24.4/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useEffect, useRef } = React;
    const {
      LineChart, Line, BarChart, Bar, AreaChart, Area, PieChart, Pie, Cell,
      XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend, ReferenceLine
    } = Recharts;

    // ============================================================
    // INLINE SVG ICON SYSTEM (replaces lucide-react)
    // ============================================================
    const ICON_PATHS = {
      truck: <React.Fragment><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></React.Fragment>,
      'dollar-sign': <React.Fragment><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></React.Fragment>,
      'trending-up': <React.Fragment><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></React.Fragment>,
      'trending-down': <React.Fragment><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></React.Fragment>,
      activity: <path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.5.5 0 0 1-.96 0L9.24 2.18a.5.5 0 0 0-.96 0l-2.35 8.36A2 2 0 0 1 4 12H2"/>,
      wrench: <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>,
      calendar: <React.Fragment><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></React.Fragment>,
      'alert-triangle': <React.Fragment><path d="M21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></React.Fragment>,
      target: <React.Fragment><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></React.Fragment>,
      layers: <React.Fragment><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m6.08 9.5-3.5 1.6a1 1 0 0 0 0 1.81l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9a1 1 0 0 0 0-1.83l-3.5-1.59"/><path d="m6.08 14.5-3.5 1.6a1 1 0 0 0 0 1.81l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9a1 1 0 0 0 0-1.83l-3.5-1.59"/></React.Fragment>,
      'chevron-up': <path d="m18 15-6-6-6 6"/>,
      'chevron-down': <path d="m6 9 6 6 6-6"/>,
      plus: <React.Fragment><path d="M5 12h14"/><path d="M12 5v14"/></React.Fragment>,
      minus: <path d="M5 12h14"/>,
      save: <React.Fragment><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></React.Fragment>,
      zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
      'bar-chart-3': <React.Fragment><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></React.Fragment>,
      gauge: <React.Fragment><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></React.Fragment>,
      route: <React.Fragment><circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/></React.Fragment>,
      'building-2': <React.Fragment><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></React.Fragment>,
      'hand-coins': <React.Fragment><path d="M11 15h2a2 2 0 1 0 0-4h-3c-.6 0-1.1.2-1.4.6L3 17"/><path d="m7 21 1.6-1.4c.3-.4.8-.6 1.4-.6h4c1.1 0 2.1-.4 2.8-1.2l4.6-4.4a2 2 0 0 0-2.75-2.91l-4.2 3.9"/><path d="m2 16 6 6"/><circle cx="16" cy="9" r="2.9"/><circle cx="6" cy="5" r="3"/></React.Fragment>,
      'circle-dot': <React.Fragment><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="1"/></React.Fragment>,
      flame: <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>,
      'check-circle-2': <React.Fragment><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></React.Fragment>,
      'x-circle': <React.Fragment><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></React.Fragment>,
      'settings-2': <React.Fragment><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></React.Fragment>,
      info: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></React.Fragment>,
      shield: <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>,
      users: <React.Fragment><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></React.Fragment>,
      fuel: <React.Fragment><line x1="3" x2="15" y1="22" y2="22"/><line x1="4" x2="14" y1="9" y2="9"/><path d="M14 22V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v18"/><path d="M14 13h2a2 2 0 0 1 2 2v2a2 2 0 0 0 2 2a2 2 0 0 0 2-2V9.83a2 2 0 0 0-.59-1.42L18 5"/></React.Fragment>,
      'map-pin': <React.Fragment><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></React.Fragment>,
      'arrow-right': <React.Fragment><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></React.Fragment>,
    };
    function Icon({ name, size = 16, color = 'currentColor', strokeWidth = 2, style }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
             stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"
             style={{ display: 'inline-block', verticalAlign: 'middle', flexShrink: 0, ...style }}>
          {ICON_PATHS[name]}
        </svg>
      );
    }
    // Component aliases — match lucide-react names so dashboard code is unchanged
    const Truck = (p) => <Icon name="truck" {...p}/>;
    const DollarSign = (p) => <Icon name="dollar-sign" {...p}/>;
    const TrendingUp = (p) => <Icon name="trending-up" {...p}/>;
    const TrendingDown = (p) => <Icon name="trending-down" {...p}/>;
    const Activity = (p) => <Icon name="activity" {...p}/>;
    const Fuel = (p) => <Icon name="fuel" {...p}/>;
    const Wrench = (p) => <Icon name="wrench" {...p}/>;
    const Shield = (p) => <Icon name="shield" {...p}/>;
    const Users = (p) => <Icon name="users" {...p}/>;
    const Calendar = (p) => <Icon name="calendar" {...p}/>;
    const MapPin = (p) => <Icon name="map-pin" {...p}/>;
    const AlertTriangle = (p) => <Icon name="alert-triangle" {...p}/>;
    const Target = (p) => <Icon name="target" {...p}/>;
    const Layers = (p) => <Icon name="layers" {...p}/>;
    const ChevronUp = (p) => <Icon name="chevron-up" {...p}/>;
    const ChevronDown = (p) => <Icon name="chevron-down" {...p}/>;
    const Plus = (p) => <Icon name="plus" {...p}/>;
    const Minus = (p) => <Icon name="minus" {...p}/>;
    const Save = (p) => <Icon name="save" {...p}/>;
    const Zap = (p) => <Icon name="zap" {...p}/>;
    const BarChart3 = (p) => <Icon name="bar-chart-3" {...p}/>;
    const Gauge = (p) => <Icon name="gauge" {...p}/>;
    const Route = (p) => <Icon name="route" {...p}/>;
    const Building2 = (p) => <Icon name="building-2" {...p}/>;
    const HandCoins = (p) => <Icon name="hand-coins" {...p}/>;
    const ArrowRight = (p) => <Icon name="arrow-right" {...p}/>;
    const CircleDot = (p) => <Icon name="circle-dot" {...p}/>;
    const Flame = (p) => <Icon name="flame" {...p}/>;
    const CheckCircle2 = (p) => <Icon name="check-circle-2" {...p}/>;
    const XCircle = (p) => <Icon name="x-circle" {...p}/>;
    const Info = (p) => <Icon name="info" {...p}/>;
    const Settings2 = (p) => <Icon name="settings-2" {...p}/>;

    // ============================================================
    // DASHBOARD CODE (transformed from React JSX source)
    // ============================================================

    // ============================================================
    // DESIGN TOKENS — industrial command-center aesthetic
    // ============================================================
    const T = {
      bg: '#0a0a0c',
      bgSurface: '#111114',
      bgElevated: '#16161b',
      bgInset: '#1c1c22',
      border: '#27272d',
      borderBright: '#3a3a42',
      text: '#fafafa',
      textDim: '#a1a1a8',
      textMuted: '#6b6b73',
      accent: '#3b82f6',          // electric blue — ops
      accentSoft: '#1e3a8a',
      cream: '#f5e6c8',
      acid: '#b8ff00',
      emerald: '#10b981',
      amber: '#f59e0b',
      rose: '#ef4444',
      violet: '#8b5cf6',
    };

    // ============================================================
    // HELPERS
    // ============================================================
    const fmt = (n) => {
      if (Math.abs(n) >= 1_000_000) return `$${(n/1_000_000).toFixed(2)}M`;
      if (Math.abs(n) >= 1000) return `$${(n/1000).toFixed(1)}K`;
      return `$${Math.round(n).toLocaleString()}`;
    };
    const fmtFull = (n) => `$${Math.round(n).toLocaleString()}`;
    const fmtPct = (n) => `${n.toFixed(1)}%`;

    // ============================================================
    // MAIN
    // ============================================================
    function TireOpsDashboard() {
      // ---- core scenario inputs
      const [trucks, setTrucks] = useState(1);
      const [dailyRate, setDailyRate] = useState(1100);
      const [workDays, setWorkDays] = useState(22);
      const [hoursPerDay, setHoursPerDay] = useState(9);
      const [driverWage, setDriverWage] = useState(22);
      const [fuelCost, setFuelCost] = useState(2500);
      const [insuranceCost, setInsuranceCost] = useState(1000);
      const [truckPayment, setTruckPayment] = useState(1200);
      const [maintenanceReserve, setMaintenanceReserve] = useState(500);
      const [miscCost, setMiscCost] = useState(400);

      // ---- route mix (must total 100)
      const [mixDedicated, setMixDedicated] = useState(60);
      const [mixHotShot, setMixHotShot] = useState(25);
      const mixDirect = Math.max(0, 100 - mixDedicated - mixHotShot);

      // ---- partnership
      const [hassanEquity, setHassanEquity] = useState(40);

      // ---- scenario preset
      const [scenario, setScenario] = useState('likely'); // best | likely | worst

      // ---- ui state
      const [activeTab, setActiveTab] = useState('overview');
      const [snapshots, setSnapshots] = useState([]);
      const [showSettings, setShowSettings] = useState(false);

      // ---- pulse animation for live indicator
      const [pulse, setPulse] = useState(true);
      useEffect(() => {
        const id = setInterval(() => setPulse(p => !p), 1400);
        return () => clearInterval(id);
      }, []);

      // ============================================================
      // CALCULATIONS
      // ============================================================
      const k = useMemo(() => {
        const sMult = scenario === 'best' ? 1.18 : scenario === 'worst' ? 0.68 : 1;
        const revPerTruck = dailyRate * workDays * sMult;
        const driverCost = driverWage * hoursPerDay * workDays;
        const fixedCosts = truckPayment + insuranceCost + maintenanceReserve;
        const variableCosts = driverCost + fuelCost + miscCost;
        const totalCostPerTruck = fixedCosts + variableCosts;
        const netPerTruck = revPerTruck - totalCostPerTruck;
        const margin = revPerTruck > 0 ? (netPerTruck / revPerTruck) * 100 : 0;

        return {
          sMult,
          revPerTruck,
          driverCost,
          fixedCosts,
          variableCosts,
          totalCostPerTruck,
          netPerTruck,
          margin,
          fleetRev: revPerTruck * trucks,
          fleetCost: totalCostPerTruck * trucks,
          fleetNet: netPerTruck * trucks,
          annualNet: netPerTruck * trucks * 12,
          breakEvenDays: dailyRate > 0 ? Math.ceil(totalCostPerTruck / (dailyRate * sMult)) : 0,
          utilization: workDays > 22 ? 100 : (workDays / 22) * 100,
        };
      }, [trucks, dailyRate, workDays, hoursPerDay, driverWage, fuelCost, insuranceCost, truckPayment, maintenanceReserve, miscCost, scenario]);

      // 24-month projection with ramp curve
      const projection = useMemo(() => {
        const startupCost = 35000 + 10000 + 2500; // truck DP + insurance + authority/LLC
        let cumulative = -startupCost;
        return Array.from({ length: 24 }, (_, i) => {
          const m = i + 1;
          // ramp: 50% m1, 70% m2, 85% m3, 100% m4+
          const ramp = m === 1 ? 0.5 : m === 2 ? 0.7 : m === 3 ? 0.85 : 1;
          // simulate scaling: add a truck every ~6 months once profitable
          const fleetSize = m < 6 ? 1 : m < 12 ? Math.min(2, trucks) : m < 18 ? Math.min(3, trucks) : trucks;
          const monthRev = k.revPerTruck * fleetSize * ramp;
          const monthCost = k.totalCostPerTruck * fleetSize;
          const monthNet = monthRev - monthCost;
          cumulative += monthNet;
          return {
            month: `M${m}`,
            m,
            revenue: Math.round(monthRev),
            cost: Math.round(monthCost),
            net: Math.round(monthNet),
            cumulative: Math.round(cumulative),
            fleet: fleetSize,
          };
        });
      }, [k, trucks]);

      const breakEvenMonth = useMemo(() => {
        const m = projection.find(p => p.cumulative >= 0);
        return m ? m.m : null;
      }, [projection]);

      // cost breakdown for pie
      const costBreakdown = useMemo(() => [
        { name: 'Driver', value: k.driverCost, color: T.accent },
        { name: 'Fuel', value: fuelCost, color: T.amber },
        { name: 'Truck Lease', value: truckPayment, color: T.violet },
        { name: 'Insurance', value: insuranceCost, color: T.emerald },
        { name: 'Maintenance', value: maintenanceReserve, color: T.rose },
        { name: 'Misc', value: miscCost, color: T.cream },
      ], [k.driverCost, fuelCost, truckPayment, insuranceCost, maintenanceReserve, miscCost]);

      // route mix economics
      const routeData = useMemo(() => {
        const routes = [
          { name: 'Dedicated', share: mixDedicated, ratePerDay: 1100, stability: 95, margin: 32 },
          { name: 'Hot Shot', share: mixHotShot, ratePerDay: 1450, stability: 55, margin: 28 },
          { name: 'Direct B2B', share: mixDirect, ratePerDay: 1300, stability: 80, margin: 41 },
        ];
        const blendedRate = routes.reduce((s, r) => s + (r.ratePerDay * r.share / 100), 0);
        const blendedMargin = routes.reduce((s, r) => s + (r.margin * r.share / 100), 0);
        return { routes, blendedRate, blendedMargin };
      }, [mixDedicated, mixHotShot, mixDirect]);

      // sensitivity analysis (impact of each variable on margin)
      const sensitivity = useMemo(() => [
        { var: 'Daily Rate', impact: 88, direction: 1 },
        { var: 'Driver Wage', impact: 64, direction: -1 },
        { var: 'Fuel', impact: 52, direction: -1 },
        { var: 'Truck Lease', impact: 34, direction: -1 },
        { var: 'Insurance', impact: 28, direction: -1 },
        { var: 'Maintenance', impact: 18, direction: -1 },
      ], []);

      // partnership numbers
      const khyreeShare = (100 - hassanEquity) / 100 * k.annualNet;
      const hassanShare = hassanEquity / 100 * k.annualNet;

      // ============================================================
      // ACTIONS
      // ============================================================
      const saveSnapshot = () => {
        const snap = {
          id: Date.now(),
          label: `${scenario.toUpperCase()} · ${trucks}T · ${fmt(k.fleetNet)}/mo`,
          scenario, trucks, dailyRate, hoursPerDay, driverWage,
          net: k.fleetNet,
          annual: k.annualNet,
          margin: k.margin,
        };
        setSnapshots(s => [snap, ...s].slice(0, 4));
      };

      const resetDefaults = () => {
        setTrucks(1); setDailyRate(1100); setWorkDays(22); setHoursPerDay(9);
        setDriverWage(22); setFuelCost(2500); setInsuranceCost(1000);
        setTruckPayment(1200); setMaintenanceReserve(500); setMiscCost(400);

        <div style={{ marginBottom: 14 }}>

        <div style={{ padding: 16, background: T.bgInset, border: `1px solid ${T.border}`, borderRadius: 4 }}>

              />
              <Insight
                tone={breakEvenMonth && breakEvenMonth < 12 ? 'pos' : breakEvenMonth ? 'warn' : 'neg'}
                label={breakEvenMonth ? `Break-even in M${breakEvenMonth}` : 'No break-even in 24mo'}
                text={breakEvenMonth ? `Capital recovery on track. Means a profitable second year.` : `Current model never repays startup cost. Increase rate or reduce starting fixed costs.`}
              />
              <Insight
                tone={k.driverCost / k.revPerTruck > 0.3 ? 'warn' : 'pos'}
                label={`Driver = ${fmtPct(k.driverCost / k.revPerTruck * 100)} of revenue`}
                text={k.driverCost / k.revPerTruck > 0.3 ? 'Wage burden is high. At this rate, consider per-stop pay or shorter routes.' : 'Driver cost ratio is healthy. You can hire above-market wage and still profit.'}
              />
            </div>
          </Card>

          {/* Quick view: 6 month flight plan */}
          <Card title="6-MONTH FLIGHT PLAN" icon={<Calendar size={13}/>}>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: 8 }}>
              {next6.map((p, i) => (
                <div key={i} style={{
                  padding: 12, background: T.bgInset, border: `1px solid ${T.border}`,

                    MONTH {p.m}

                  <div style={{ fontSize: 10, color: T.textDim, marginTop: 4 }}>
                    {p.fleet} truck{p.fleet > 1 ? 's' : ''} · cum {fmt(p.cumulative)}

                    <div style={{ position: 'absolute', top: 6, right: 6 }}>

      );
    }

    function Insight({ tone, label, text }) {
      const colors = { pos: T.emerald, warn: T.amber, neg: T.rose };
      const Icon = tone === 'pos' ? CheckCircle2 : tone === 'warn' ? AlertTriangle : XCircle;
      return (
        <div style={{
          padding: 14, background: T.bgInset, border: `1px solid ${T.border}`,
          borderLeft: `3px solid ${colors[tone]}`, borderRadius: 4
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8 }}>
            <Icon size={14} color={colors[tone]} />
            <span style={{ fontSize: 12, fontWeight: 600, color: colors[tone] }}>{label}</span>
          </div>
          <p style={{ fontSize: 12, color: T.textDim, margin: 0, lineHeight: 1.5 }}>{text}</p>
        </div>
      );
    }

    // ============================================================
    // TAB: SCENARIO LAB
    // ============================================================
    function ModelerTab({ k, dailyRate, driverWage, fuelCost, workDays, hoursPerDay, truckPayment, insuranceCost, maintenanceReserve, miscCost }) {
      // Generate sweep across daily rates
      const rateSweep = useMemo(() => {
        const rates = [600, 800, 1000, 1100, 1200, 1400, 1600, 1800, 2000];
        return rates.map(r => {
          const rev = r * workDays;
          const cost = (driverWage * hoursPerDay * workDays) + fuelCost + truckPayment + insuranceCost + maintenanceReserve + miscCost;
          const net = rev - cost;
          return { rate: r, net, margin: (net / rev) * 100 };
        });
      }, [driverWage, hoursPerDay, workDays, fuelCost, truckPayment, insuranceCost, maintenanceReserve, miscCost]);

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr', gap: 16 }}>
            <Card title="DAILY RATE SWEEP — NET PROFIT CURVE" icon={<TrendingUp size={13}/>}>
              <ResponsiveContainer width="100%" height={300}>
                <BarChart data={rateSweep}>
                  <CartesianGrid stroke={T.border} strokeDasharray="3 3" vertical={false}/>
                  <XAxis dataKey="rate" stroke={T.textMuted} fontSize={10} tickFormatter={v => `$${v}`}/>
                  <YAxis stroke={T.textMuted} fontSize={10} tickFormatter={v => fmt(v)}/>
                  <Tooltip
                    contentStyle={{ background: T.bgInset, border: `1px solid ${T.borderBright}`, borderRadius: 4, fontSize: 12 }}
                    formatter={(v, name) => name === 'margin' ? `${v.toFixed(1)}%` : fmtFull(v)}
                  />
                  <ReferenceLine y={0} stroke={T.rose} strokeDasharray="3 3"/>
                  <ReferenceLine x={dailyRate} stroke={T.cream} strokeDasharray="2 2" label={{ value: 'NOW', fill: T.cream, fontSize: 10 }}/>
                  <Bar dataKey="net" name="Monthly net">
                    {rateSweep.map((d, i) => (
                      <Cell key={i} fill={d.net > 0 ? (d.rate === dailyRate ? T.accent : T.emerald) : T.rose} />
                    ))}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
              <p style={{ fontSize: 11, color: T.textDim, marginTop: 8 }}>
                <span className="serif-italic" style={{ color: T.cream }}>Read: </span>
                Each $100/day increase in rate adds ~${(workDays * 100).toLocaleString()}/mo to net (cost stays fixed). Find the rate floor below which you walk away.
              </p>
            </Card>

            <Card title="UNIT ECONOMICS · PER DAY" icon={<DollarSign size={13}/>}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                <UnitRow label="Revenue per day" value={fmtFull(dailyRate)} accent={T.accent}/>
                <UnitRow label="Driver cost / day" value={`-${fmtFull(driverWage * hoursPerDay)}`} accent={T.rose}/>
                <UnitRow label="Fuel / day" value={`-${fmtFull(fuelCost / workDays)}`} accent={T.rose}/>
                <UnitRow label="Lease / day" value={`-${fmtFull(truckPayment / workDays)}`} accent={T.rose}/>
                <UnitRow label="Other fixed / day" value={`-${fmtFull((insuranceCost + maintenanceReserve + miscCost) / workDays)}`} accent={T.rose}/>
                <div style={{ height: 1, background: T.border, margin: '4px 0' }}/>
                <UnitRow label="Net per day" value={fmtFull(k.netPerTruck / workDays)} accent={k.netPerTruck > 0 ? T.emerald : T.rose} bold/>
                <UnitRow label="Net per hour driven" value={fmtFull((k.netPerTruck / workDays) / hoursPerDay)} accent={T.text}/>
              </div>
            </Card>
          </div>

          {/* Comparison table */}
          <Card title="WHAT-IF MATRIX · KEY LEVERS" icon={<Settings2 size={13}/>}>
            <div style={{ overflowX: 'auto' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                <thead>
                  <tr style={{ borderBottom: `1px solid ${T.border}` }}>
                    <th style={th}>LEVER</th>
                    <th style={th}>CURRENT</th>
                    <th style={th}>+10%</th>
                    <th style={th}>+25%</th>
                    <th style={th}>-10%</th>
                    <th style={th}>-25%</th>
                    <th style={th}>SENSITIVITY</th>
                  </tr>
                </thead>
                <tbody>
                  {[
                    { name: 'Daily rate', cur: dailyRate, fmt: v => `$${v.toFixed(0)}`, mult: 1, levRev: true },
                    { name: 'Driver wage', cur: driverWage, fmt: v => `$${v.toFixed(2)}/hr`, mult: -hoursPerDay * workDays / (dailyRate * workDays), levRev: false },
                    { name: 'Fuel', cur: fuelCost, fmt: v => `$${v.toFixed(0)}`, mult: -1 / (dailyRate * workDays), levRev: false },
                    { name: 'Working days', cur: workDays, fmt: v => `${v.toFixed(0)} days`, mult: 1, levRev: true },
                  ].map((row, i) => {
                    const baseNet = k.netPerTruck;
                    const baseRev = dailyRate * workDays;
                    const variants = [0.1, 0.25, -0.1, -0.25].map(d => {
                      const newVal = row.cur * (1 + d);
                      let newNet;
                      if (row.name === 'Daily rate') newNet = newVal * workDays - (k.driverCost + fuelCost + truckPayment + insuranceCost + maintenanceReserve + miscCost);
                      else if (row.name === 'Driver wage') newNet = baseRev - (newVal * hoursPerDay * workDays + fuelCost + truckPayment + insuranceCost + maintenanceReserve + miscCost);
                      else if (row.name === 'Fuel') newNet = baseRev - (k.driverCost + newVal + truckPayment + insuranceCost + maintenanceReserve + miscCost);
                      else newNet = dailyRate * newVal - (driverWage * hoursPerDay * newVal + fuelCost + truckPayment + insuranceCost + maintenanceReserve + miscCost);
                      return newNet;
                    });
                    const maxImpact = Math.max(...variants.map(v => Math.abs(v - baseNet)));
                    return (
                      <tr key={i} style={{ borderBottom: `1px solid ${T.border}` }}>
                        <td style={{ ...td, fontWeight: 600 }}>{row.name}</td>
                        <td style={{ ...td, color: T.textDim }}>{row.fmt(row.cur)}</td>
                        {variants.map((v, j) => (
                          <td key={j} style={{ ...td, color: v > baseNet ? T.emerald : T.rose }} className="mono-font">
                            {fmt(v)}
                          </td>
                        ))}
                        <td style={td}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                            <div style={{ flex: 1, height: 4, background: T.border, borderRadius: 2 }}>
                              <div style={{ width: `${Math.min(100, (maxImpact / 5000) * 100)}%`, height: '100%', background: T.accent, borderRadius: 2 }}/>
                            </div>
                            <span className="mono-font" style={{ fontSize: 10, color: T.textMuted }}>{fmt(maxImpact)}</span>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      );
    }

    function UnitRow({ label, value, accent, bold }) {
      return (
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontSize: 12, color: T.textDim }}>{label}</span>

          </span>
        </div>
      );
    }

    const th = { padding: '10px 12px', textAlign: 'left', fontSize: 10, color: T.textMuted, letterSpacing: '0.1em', fontWeight: 600 };
    const td = { padding: '12px', color: T.text };

    // ============================================================
    // TAB: FLEET P&L
    // ============================================================
    function FleetTab({ k, trucks, costBreakdown }) {

      const scaleData = fleetSizes.map(size => ({
        fleet: `${size}T`,

        cost: k.totalCostPerTruck * size,

              <StatBlock label="MONTHLY REVENUE" value={fmt(k.fleetRev)} sub={`${trucks} truck${trucks > 1 ? 's' : ''} × ${fmt(k.revPerTruck)}`} accent={T.accent} large/>
              <StatBlock label="MONTHLY COSTS" value={fmt(k.fleetCost)} sub={`${fmtPct((k.fleetCost / k.fleetRev) * 100)} of revenue`} accent={T.rose} large/>

            <div style={{ marginTop: 20, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
              <div>
                <div className="mono-font" style={{ fontSize: 10, color: T.textMuted, letterSpacing: '0.15em', marginBottom: 12 }}>REVENUE FLOW</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {[
                    ['Gross revenue', k.fleetRev, T.accent],
                    ['(-) Driver wages', k.driverCost * trucks, T.rose],
                    ['(-) Fuel', k.fleetCost > 0 ? (2500 * trucks) : 0, T.rose],
                    ['(-) Lease + Insurance', (1000 + 1200) * trucks, T.rose],
                    ['(-) Maint + Misc', (500 + 400) * trucks, T.rose],
                  ].map(([l, v, c], i) => (
                    <FlowRow key={i} label={l} value={v} max={k.fleetRev} color={c}/>

                  <div style={{ height: 1, background: T.border, margin: '4px 0' }}/>
                  <FlowRow label="= NET PROFIT" value={k.fleetNet} max={k.fleetRev} color={T.emerald} bold/>
                </div>
              </div>
              <div>
                <div className="mono-font" style={{ fontSize: 10, color: T.textMuted, letterSpacing: '0.15em', marginBottom: 12 }}>COST RATIOS</div>
                <ResponsiveContainer width="100%" height={220}>
                  <BarChart data={costBreakdown} layout="vertical">
                    <CartesianGrid stroke={T.border} strokeDasharray="3 3" horizontal={false}/>
                    <XAxis type="number" stroke={T.textMuted} fontSize={10} tickFormatter={v => fmt(v)}/>
                    <YAxis dataKey="name" type="category" stroke={T.textMuted} fontSize={11} width={80}/>
                    <Tooltip formatter={v => fmtFull(v)} contentStyle={{ background: T.bgInset, border: `1px solid ${T.borderBright}`, borderRadius: 4, fontSize: 12 }}/>
                    <Bar dataKey="value" radius={[0, 2, 2, 0]}>
                      {costBreakdown.map((c, i) => <Cell key={i} fill={c.color}/>)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>
          </Card>

          <Card title="FLEET SCALING · ECONOMICS BY SIZE" icon={<Truck size={13}/>}>
            <ResponsiveContainer width="100%" height={250}>
              <BarChart data={scaleData}>
                <CartesianGrid stroke={T.border} strokeDasharray="3 3" vertical={false}/>
                <XAxis dataKey="fleet" stroke={T.textMuted} fontSize={11}/>
                <YAxis stroke={T.textMuted} fontSize={10} tickFormatter={v => fmt(v)}/>
                <Tooltip formatter={v => fmtFull(v)} contentStyle={{ background: T.bgInset, border: `1px solid ${T.borderBright}`, borderRadius: 4, fontSize: 12 }}/>
                <Legend wrapperStyle={{ fontSize: 11 }}/>
                <Bar dataKey="revenue" fill={T.accent} name="Revenue" radius={[2, 2, 0, 0]}/>
                <Bar dataKey="cost" fill={T.rose} name="Cost" radius={[2, 2, 0, 0]}/>
                <Bar dataKey="realNet" fill={T.emerald} name="Net (after dispatch overhead)" radius={[2, 2, 0, 0]}/>
              </BarChart>
            </ResponsiveContainer>
            <p style={{ fontSize: 11, color: T.textDim, marginTop: 8 }}>
              <span className="serif-italic" style={{ color: T.cream }}>Note: </span>
              At 3+ trucks, ~$800/mo per truck of dispatch & coordination overhead kicks in. Single-truck operations don't have this drag.
            </p>
          </Card>

          <Card title="STARTUP CAPITAL · ONE-TIME COSTS" icon={<Building2 size={13}/>}>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
              <StartupItem label="Used box truck (DP)" value={8000} note="$35k truck @ 25% down"/>
              <StartupItem label="MC + DOT authority" value={1500} note="If interstate"/>
              <StartupItem label="LLC + EIN + accountant" value={800} note="One-time setup"/>
              <StartupItem label="Insurance deposit" value={2500} note="First/last month"/>
              <StartupItem label="Working capital buffer" value={15000} note="60-day runway"/>
              <StartupItem label="Equipment (straps, dolly, GPS)" value={1200} note="One-time"/>
              <StartupItem label="Marketing + sales (route landing)" value={2000} note="First contracts"/>
              <StartupItem label="Permits + parking" value={1500} note="Yard lease etc"/>
            </div>
            <div style={{
              marginTop: 16, padding: 16, background: T.bgInset,
              border: `1px solid ${T.accent}40`, borderRadius: 4, display: 'flex', justifyContent: 'space-between', alignItems: 'center'
            }}>
              <div>
                <div className="mono-font" style={{ fontSize: 10, color: T.textMuted, letterSpacing: '0.15em' }}>TOTAL STARTUP CAPITAL</div>
                <div className="display-font" style={{ fontSize: 28, fontWeight: 700, color: T.accent, marginTop: 4 }}>$32,500</div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div className="mono-font" style={{ fontSize: 10, color: T.textMuted, letterSpacing: '0.15em' }}>RECOVERY @ CURRENT</div>
                <div className="display-font" style={{ fontSize: 28, fontWeight: 700, color: k.fleetNet > 0 ? T.emerald : T.rose, marginTop: 4 }}>
                  {k.fleetNet > 0 ? `${Math.ceil(32500 / k.fleetNet)}mo` : '—'}
                </div>
              </div>
            </div>
          </Card>
        </div>
      );
    }

    function FlowRow({ label, value, max, color, bold }) {
      const pct = Math.min(100, (Math.abs(value) / max) * 100);
      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
            <span style={{ fontSize: 11, color: bold ? T.text : T.textDim, fontWeight: bold ? 700 : 400 }}>{label}</span>
            <span className="mono-font" style={{ fontSize: 12, color: color, fontWeight: bold ? 700 : 600 }}>{fmt(value)}</span>
          </div>
          <div style={{ height: 4, background: T.bgInset, borderRadius: 2, overflow: 'hidden' }}>
            <div style={{ width: `${pct}%`, height: '100%', background: color, opacity: bold ? 1 : 0.6 }}/>
          </div>
        </div>
      );
    }

    function StartupItem({ label, value, note }) {
      return (
        <div style={{ padding: 12, background: T.bgInset, border: `1px solid ${T.border}`, borderRadius: 4 }}>
          <div className="mono-font" style={{ fontSize: 9, color: T.textMuted, letterSpacing: '0.1em', marginBottom: 6 }}>{label}</div>

        </div>
      );
    }

    // TAB: PROJECTION

                  <linearGradient id="cum-neg" x1="0" y1="0" x2="0" y2="1">

                  <YAxis stroke={T.textMuted} fontSize={10} tickFormatter={v => fmt(v)}/>

                  <Bar dataKey="revenue" fill={T.accent} name="Revenue" radius={[2, 2, 0, 0]}/>
                  <Bar dataKey="net" fill={T.emerald} name="Net" radius={[2, 2, 0, 0]}/>

            </table>
          </Card>
        </div>
      );
    }

    // TAB: ROUTES
    // ============================================================
    function RoutesTab({ routeData, mixDedicated, setMixDedicated, mixHotShot, setMixHotShot, mixDirect }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <Card title="ROUTE TYPE COMPARISON" icon={<Route size={13}/>}>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
              {[
                { name: 'Dedicated Routes', tagline: 'Predictable. Boring. Cash-flowing.', desc: 'Sign with regional distributors (ATD, US AutoForce, K&M). Same shops, same drops, every day. $800–$1,500/day.', pros: ['Predictable income', 'Easy to staff', 'Long contracts (1yr+)'], cons: ['Lower rate ceiling', 'Brokers take spread', 'Lose contract = lose 100%'], color: T.accent, badge: 'STABLE' },
                { name: 'Hot Shot / On-Demand', tagline: 'Higher pay. Inconsistent. Hustle-driven.', desc: 'Bid on jobs through Curri, Roadie, GoShare. $150–$600 per run. Best for filling empty truck days.', pros: ['Premium per-job pay', 'No long contracts', 'Quick to start'], cons: ['Inconsistent volume', 'Need active dispatch', 'Race-to-bottom pricing'], color: T.amber, badge: 'VARIABLE' },
                { name: 'Direct B2B', tagline: 'Highest margin. Hardest to land.', desc: 'Independent shops, used tire lots, mobile installers. Flat retainer or per-run. No middleman.', pros: ['Best margins (40%+)', 'Long-term relationships', 'Cross-sell other services'], cons: ['Sales-heavy to acquire', 'Smaller per-account volume', 'Slower to scale'], color: T.emerald, badge: 'PREMIUM' },
              ].map((r, i) => (
                <div key={i} style={{ padding: 16, background: T.bgInset, border: `1px solid ${T.border}`, borderTop: `3px solid ${r.color}`, borderRadius: 4 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
                    <div className="display-font" style={{ fontSize: 18, fontWeight: 700, color: T.text }}>{r.name}</div>
                    <span className="mono-font" style={{ fontSize: 9, padding: '2px 6px', background: r.color + '20', color: r.color, borderRadius: 2, letterSpacing: '0.1em', fontWeight: 600 }}>
                      {r.badge}
                    </span>
                  </div>
                  <p className="serif-italic" style={{ fontSize: 12, color: T.cream, margin: '0 0 12px' }}>"{r.tagline}"</p>
                  <p style={{ fontSize: 11, color: T.textDim, lineHeight: 1.5, marginBottom: 12 }}>{r.desc}</p>
                  <div style={{ marginBottom: 8 }}>
                    <div className="mono-font" style={{ fontSize: 9, color: T.emerald, letterSpacing: '0.15em', marginBottom: 4 }}>UPSIDE</div>
                    {r.pros.map((p, j) => (
                      <div key={j} style={{ display: 'flex', gap: 6, fontSize: 11, color: T.text, marginBottom: 3 }}>
                        <ChevronUp size={12} color={T.emerald} style={{ marginTop: 2, flexShrink: 0 }}/>
                        <span>{p}</span>
                      </div>
                    ))}
                  </div>
                  <div>
                    <div className="mono-font" style={{ fontSize: 9, color: T.rose, letterSpacing: '0.15em', marginBottom: 4 }}>DOWNSIDE</div>
                    {r.cons.map((p, j) => (
                      <div key={j} style={{ display: 'flex', gap: 6, fontSize: 11, color: T.text, marginBottom: 3 }}>
                        <ChevronDown size={12} color={T.rose} style={{ marginTop: 2, flexShrink: 0 }}/>
                        <span>{p}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </Card>

          <Card title="YOUR PORTFOLIO MIX · LIVE" icon={<Layers size={13}/>}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
              <div>
                <div style={{ marginBottom: 16 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                    <span style={{ fontSize: 12, color: T.textDim }}>Dedicated</span>
                    <span className="mono-font" style={{ fontSize: 12, color: T.accent, fontWeight: 600 }}>{mixDedicated}%</span>
                  </div>
                  <input type="range" min={0} max={100} value={mixDedicated} onChange={e => setMixDedicated(Math.min(100 - mixHotShot, parseInt(e.target.value)))} />
                </div>
                <div style={{ marginBottom: 16 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                    <span style={{ fontSize: 12, color: T.textDim }}>Hot Shot</span>
                    <span className="mono-font" style={{ fontSize: 12, color: T.amber, fontWeight: 600 }}>{mixHotShot}%</span>
                  </div>
                  <input type="range" min={0} max={100} value={mixHotShot} onChange={e => setMixHotShot(Math.min(100 - mixDedicated, parseInt(e.target.value)))} />
                </div>
                <div style={{ marginBottom: 16 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                    <span style={{ fontSize: 12, color: T.textDim }}>Direct B2B (auto)</span>
                    <span className="mono-font" style={{ fontSize: 12, color: T.emerald, fontWeight: 600 }}>{mixDirect}%</span>
                  </div>
                  <div style={{ height: 4, background: T.borderBright, borderRadius: 2, opacity: 0.5 }}>
                    <div style={{ width: `${mixDirect}%`, height: '100%', background: T.emerald, borderRadius: 2 }}/>
                  </div>
                </div>

                <div style={{ marginTop: 24, padding: 16, background: T.bgInset, border: `1px solid ${T.border}`, borderRadius: 4 }}>
                  <StatBlock label="BLENDED DAILY RATE" value={fmtFull(routeData.blendedRate)} sub={`${fmtPct(routeData.blendedMargin)} blended margin`} accent={T.cream}/>
                </div>
              </div>

              <ResponsiveContainer width="100%" height={280}>
                <PieChart>
                  <Pie
                    data={[
                      { name: 'Dedicated', value: mixDedicated, color: T.accent },
                      { name: 'Hot Shot', value: mixHotShot, color: T.amber },
                      { name: 'Direct B2B', value: mixDirect, color: T.emerald },
                    ]}
                    cx="50%" cy="50%" innerRadius={60} outerRadius={110}
                    paddingAngle={3}
                    dataKey="value"
                  >
                    {[T.accent, T.amber, T.emerald].map((c, i) => <Cell key={i} fill={c} stroke={T.bg} strokeWidth={2}/>)}
                  </Pie>
                  <Tooltip contentStyle={{ background: T.bgInset, border: `1px solid ${T.borderBright}`, borderRadius: 4, fontSize: 12 }}/>
                </PieChart>
              </ResponsiveContainer>
            </div>
          </Card>
        </div>
      );
    }

    // ============================================================
    // TAB: RISK
    // ============================================================
    function RiskTab({ sensitivity, k }) {
      const risks = [
        { name: 'Lose primary contract', prob: 30, impact: -k.fleetNet * 0.7, severity: 'CRITICAL', mitig: 'Diversify across 3+ accounts within 90 days. Never let one client = >40% of revenue.' },
        { name: 'Driver no-show / quit', prob: 60, impact: -800, severity: 'MEDIUM', mitig: 'Pre-train a backup driver. Build a 2-deep bench before hiring full-time.' },
        { name: 'Fuel price spike +20%', prob: 35, impact: -500, severity: 'LOW', mitig: 'Build fuel surcharge into contracts. Negotiate annually. Rate covers worst-case fuel.' },
        { name: 'Truck breakdown (3+ days)', prob: 40, impact: -3000, severity: 'HIGH', mitig: '$500/mo maintenance reserve. Pre-arranged backup truck rental contact.' },
        { name: 'Insurance claim', prob: 15, impact: -5000, severity: 'HIGH', mitig: 'Hire cleanly. MVR check every 6mo. Cargo insurance in place.' },
        { name: 'Recession / volume drop', prob: 25, impact: -k.fleetRev * 0.3, severity: 'MEDIUM', mitig: 'Diversify route mix. Direct B2B is more recession-resistant than wholesale.' },
      ];

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
            <Card title="MARGIN SENSITIVITY · LEVER IMPACT" icon={<Gauge size={13}/>}>
              {sensitivity.map((s, i) => (
                <div key={i} style={{ marginBottom: 14 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                    <span style={{ fontSize: 12, color: T.text, display: 'flex', alignItems: 'center', gap: 6 }}>
                      {s.direction > 0 ? <TrendingUp size={12} color={T.emerald}/> : <TrendingDown size={12} color={T.rose}/>}
                      {s.var}
                    </span>
                    <span className="mono-font" style={{ fontSize: 11, color: T.textDim, fontWeight: 600 }}>{s.impact}%</span>
                  </div>
                  <div style={{ height: 6, background: T.bgInset, borderRadius: 3, overflow: 'hidden' }}>
                    <div style={{
                      width: `${s.impact}%`, height: '100%',
                      background: `linear-gradient(90deg, ${s.direction > 0 ? T.emerald : T.rose}, ${s.direction > 0 ? T.emerald + '80' : T.rose + '80'})`,
                    }}/>
                  </div>
                </div>
              ))}
              <p style={{ fontSize: 11, color: T.textDim, marginTop: 12, lineHeight: 1.5 }}>
                <span className="serif-italic" style={{ color: T.cream }}>Read: </span>
                Daily rate is your #1 lever — a 10% rate increase hits the bottom line harder than a 25% fuel cut. Negotiate up.
              </p>
            </Card>

            <Card title="DOWNSIDE STRESS TEST" icon={<Flame size={13}/>}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                <StressCase label="Best case" pct={1.18} k={k} accent={T.emerald}/>
                <StressCase label="Likely" pct={1.0} k={k} accent={T.accent}/>
                <StressCase label="Tough month" pct={0.85} k={k} accent={T.amber}/>
                <StressCase label="Crisis" pct={0.65} k={k} accent={T.rose}/>
              </div>
              <div style={{ marginTop: 16, padding: 12, background: T.bgInset, border: `1px solid ${T.amber}30`, borderLeft: `3px solid ${T.amber}`, borderRadius: 4 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                  <AlertTriangle size={14} color={T.amber}/>
                  <span style={{ fontSize: 12, fontWeight: 600, color: T.amber }}>Survival math</span>
                </div>
                <p style={{ fontSize: 11, color: T.textDim, margin: 0, lineHeight: 1.5 }}>
                  You need at least 60 days of fixed costs ({fmt((k.fixedCosts) * 2)}) in a separate operating account before going live. Don't dip into it.
                </p>
              </div>
            </Card>
          </div>

          <Card title="RISK REGISTER · PROBABILITY × IMPACT" icon={<AlertTriangle size={13}/>}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
              <thead>
                <tr style={{ borderBottom: `1px solid ${T.border}` }}>
                  <th style={th}>RISK EVENT</th>
                  <th style={th}>PROB</th>
                  <th style={th}>IMPACT</th>
                  <th style={th}>SEVERITY</th>
                  <th style={{ ...th, width: '40%' }}>MITIGATION</th>
                </tr>
              </thead>
              <tbody>
                {risks.map((r, i) => {
                  const sevColor = r.severity === 'CRITICAL' ? T.rose : r.severity === 'HIGH' ? T.amber : r.severity === 'MEDIUM' ? T.cream : T.textDim;
                  return (
                    <tr key={i} style={{ borderBottom: `1px solid ${T.border}` }}>
                      <td style={{ ...td, fontWeight: 600 }}>{r.name}</td>
                      <td style={td}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                          <div style={{ width: 50, height: 4, background: T.bgInset, borderRadius: 2 }}>
                            <div style={{ width: `${r.prob}%`, height: '100%', background: T.amber, borderRadius: 2 }}/>
                          </div>
                          <span className="mono-font" style={{ fontSize: 11, color: T.textMuted }}>{r.prob}%</span>
                        </div>
                      </td>
                      <td style={{ ...td, color: T.rose }} className="mono-font">{fmt(r.impact)}</td>
                      <td style={td}>
                        <span style={{ fontSize: 10, padding: '2px 8px', background: sevColor + '20', color: sevColor, borderRadius: 2, letterSpacing: '0.1em', fontWeight: 600 }}>
                          {r.severity}
                        </span>
                      </td>
                      <td style={{ ...td, color: T.textDim, fontSize: 11, lineHeight: 1.5 }}>{r.mitig}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </Card>
        </div>
      );
    }

    function StressCase({ label, pct, k, accent }) {
      const adjustedRev = k.revPerTruck * pct;
      const net = adjustedRev - k.totalCostPerTruck;
      return (
        <div style={{ padding: 14, background: T.bgInset, border: `1px solid ${T.border}`, borderLeft: `3px solid ${accent}`, borderRadius: 4 }}>
          <div className="mono-font" style={{ fontSize: 9, color: T.textMuted, letterSpacing: '0.15em', marginBottom: 6 }}>{label.toUpperCase()}</div>
          <div className="display-font" style={{ fontSize: 22, fontWeight: 700, color: net > 0 ? T.emerald : T.rose }}>{fmt(net)}</div>
          <div style={{ fontSize: 10, color: T.textDim, marginTop: 4 }}>{(pct * 100 - 100).toFixed(0)}% rev vs base</div>
        </div>
      );
    }

    // ============================================================
    // TAB: PARTNERSHIP
    // ============================================================
    function PartnerTab({ hassanEquity, setHassanEquity, khyreeShare, hassanShare, k }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <Card title="EQUITY STRUCTURE · KHYREE / SHAQ" icon={<HandCoins size={13}/>}>
            <p className="serif-italic" style={{ fontSize: 13, color: T.cream, margin: '0 0 16px', maxWidth: 700 }}>
              "You fund and structure from Cairo. Shaq runs operations stateside. Family operation. Build the split that's fair to both sides."
            </p>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24, marginBottom: 24 }}>
              <div style={{ padding: 20, background: T.bgInset, border: `1px solid ${T.accent}40`, borderRadius: 6 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
                  <CircleDot size={14} color={T.accent}/>
                  <span className="mono-font" style={{ fontSize: 11, color: T.textDim, letterSpacing: '0.15em' }}>KHYREE · OPERATOR / CAPITAL</span>
                </div>
                <div className="display-font" style={{ fontSize: 36, fontWeight: 700, color: T.accent, lineHeight: 1 }}>{100 - hassanEquity}%</div>
                <div style={{ marginTop: 16 }}>
                  <UnitRow label="Annual share" value={fmt(khyreeShare)} accent={T.text} bold/>
                  <div style={{ height: 8 }}/>
                  <UnitRow label="Monthly distribution" value={fmt(khyreeShare / 12)} accent={T.textDim}/>
                  <div style={{ height: 8 }}/>
                  <UnitRow label="Weekly cash" value={fmt(khyreeShare / 52)} accent={T.textDim}/>
                </div>
                <div style={{ marginTop: 16, fontSize: 11, color: T.textDim, lineHeight: 1.5 }}>
                  Capital provider, structure, contracts, growth strategy. Remote from Cairo.
                </div>
              </div>

              <div style={{ padding: 20, background: T.bgInset, border: `1px solid ${T.cream}40`, borderRadius: 6 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
                  <CircleDot size={14} color={T.cream}/>
                  <span className="mono-font" style={{ fontSize: 11, color: T.textDim, letterSpacing: '0.15em' }}>SHAQ · OPS LEAD</span>
                </div>
                <div className="display-font" style={{ fontSize: 36, fontWeight: 700, color: T.cream, lineHeight: 1 }}>{hassanEquity}%</div>
                <div style={{ marginTop: 16 }}>
                  <UnitRow label="Annual share" value={fmt(hassanShare)} accent={T.text} bold/>
                  <div style={{ height: 8 }}/>
                  <UnitRow label="Monthly distribution" value={fmt(hassanShare / 12)} accent={T.textDim}/>
                  <div style={{ height: 8 }}/>
                  <UnitRow label="Weekly cash" value={fmt(hassanShare / 52)} accent={T.textDim}/>
                </div>
                <div style={{ marginTop: 16, fontSize: 11, color: T.textDim, lineHeight: 1.5 }}>
                  Daily ops, hire/fire, dispatch, vendor calls, on-site fires. Sweat equity + base salary.
                </div>
              </div>
            </div>

            <div style={{ marginBottom: 8 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                <span style={{ fontSize: 12, color: T.textDim }}>Shaq equity %</span>
                <span className="mono-font" style={{ fontSize: 14, color: T.cream, fontWeight: 700 }}>{hassanEquity}%</span>
              </div>
              <input type="range" min={10} max={50} value={hassanEquity} onChange={e => setHassanEquity(parseInt(e.target.value))} />
              <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 4 }}>
                <span className="mono-font" style={{ fontSize: 9, color: T.textMuted }}>10% (silent partner)</span>
                <span className="mono-font" style={{ fontSize: 9, color: T.textMuted }}>50% (equal)</span>
              </div>
            </div>
          </Card>

          <Card title="STRUCTURE TEMPLATES" icon={<Layers size={13}/>}>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
              {[
                { name: 'Capital-heavy', split: '80/20', desc: 'You fund 100%. Shaq runs ops on a base ($4-5k/mo) + 20% equity. Best when capital risk is high and ops is lean.', when: 'Year 1, single truck, proving model.' },
                { name: 'Co-founder', split: '60/40', desc: 'You fund 100%. Shaq brings full sweat. No salary, just 40% of profits + dividends. Higher upside both sides.', when: 'You trust him to grind through year 1 with no cash.' },
                { name: 'Equal partners', split: '50/50', desc: 'You fund, but Shaq adds capital pro-rata over time (sweat-converts). True partnership. Hardest to unwind.', when: 'Long-term family business, 5+ year horizon.' },
              ].map((s, i) => (
                <div key={i} style={{ padding: 14, background: T.bgInset, border: `1px solid ${T.border}`, borderRadius: 4 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 8 }}>
                    <span className="display-font" style={{ fontSize: 16, fontWeight: 700, color: T.text }}>{s.name}</span>
                    <span className="mono-font" style={{ fontSize: 14, color: T.accent, fontWeight: 700 }}>{s.split}</span>
                  </div>
                  <p style={{ fontSize: 11, color: T.textDim, lineHeight: 1.5, marginBottom: 10 }}>{s.desc}</p>
                  <div style={{ paddingTop: 8, borderTop: `1px solid ${T.border}` }}>
                    <span className="mono-font" style={{ fontSize: 9, color: T.cream, letterSpacing: '0.15em' }}>WHEN TO USE</span>
                    <p style={{ fontSize: 11, color: T.text, margin: '4px 0 0', fontStyle: 'italic' }}>{s.when}</p>
                  </div>
                </div>
              ))}
            </div>
          </Card>

          <Card title="DECISION FRAMEWORK · MUST-HAVES BEFORE LAUNCH" icon={<CheckCircle2 size={13}/>}>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10 }}>
              {[
                'Operating agreement signed (LLC formed in same state as ops)',
                'Roles documented in writing — who has hire/fire authority',
                'Bank account with both signatories, but Shaq has daily-ops access',
                'Monthly P&L review (you set the cadence — non-negotiable)',
                'Buy-out clause — what happens if one of you wants out',
                'Death/disability clause — what protects the family',
                'Performance gates — equity vests over 24-36 months',
                'Compliance: TCPA, DOT, MC# — don\'t skip the boring paperwork',
              ].map((item, i) => (
                <div key={i} style={{ display: 'flex', gap: 10, padding: '10px 12px', background: T.bgInset, border: `1px solid ${T.border}`, borderRadius: 4 }}>
                  <CheckCircle2 size={14} color={T.emerald} style={{ flexShrink: 0, marginTop: 2 }}/>
                  <span style={{ fontSize: 12, color: T.text, lineHeight: 1.5 }}>{item}</span>
                </div>
              ))}
            </div>
          </Card>
        </div>
      );
    }

    // ============================================================
    // RENDER + HIDE LOADING
    // ============================================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TireOpsDashboard />);
    setTimeout(() => {
      const loader = document.getElementById('loading');
      if (loader) loader.classList.add('hidden');
      setTimeout(() => loader && loader.remove(), 500);
    }, 300);
  </script>
</body>
</html>
