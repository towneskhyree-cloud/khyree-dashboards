function Icon({ name, size = 20, color = "currentColor", strokeWidth = 2, style }) {
  const data = ICON_PATHS[name];
  if (!data) return null;
  const parts = data.split('|').map((p, i) => {
    if (p.startsWith('C:')) {
      const [cx, cy, r] = p.slice(2).split(',').map(Number);
      return <circle key={i} cx={cx} cy={cy} r={r}/>;
    }
    if (p.startsWith('R:')) {
      const [x, y, w, h, rx, ry] = p.slice(2).split(',').map(Number);
      return <rect key={i} x={x} y={y} width={w} height={h} rx={rx || 0} ry={ry || 0}/>;
    }
    return <path key={i} d={p}/>;
  });
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
      viewBox="0 0 24 24" fill="none" stroke={color}
      strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"
      style={style}>
      {parts}
    </svg>
  );
}

const fmtMoney = (n) => {
  if (!n && n !== 0) return "$0";
  if (Math.abs(n) >= 1000) {
    const k = n / 1000;
    return "$" + (k % 1 === 0 ? k.toFixed(0) : k.toFixed(1)) + "K";
  }
  return "$" + Math.round(n).toLocaleString("en-US");
};
const fmtFull = (n) => {
  if (!n && n !== 0) return "$0";
  return "$" + Math.round(n).toLocaleString("en-US");
};

// ─── SliderLine ────────────────────────────────────────────
function SliderLine({ item, value, onChange, accent, type }) {
  const pct = item.max > item.min ? ((value - item.min) / (item.max - item.min)) * 100 : 0;
  const [showNote, setShowNote] = useState(false);
  const trackClass = type === "income" ? "income-track" : type === "save" ? "save-track" : "expense-track";

  return (
    <div className="fade-in" style={{ padding: "14px 0", borderBottom: "1px solid " + C.lineSoft }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8, gap: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, flex: 1, minWidth: 0 }}>
          <div className="font-body" style={{ fontSize: 14, fontWeight: 600, color: C.ink, lineHeight: 1.3 }}>
            {item.name}
          </div>
          <button onClick={() => setShowNote(!showNote)} style={{
            background: "transparent", border: "none", padding: 0, cursor: "pointer",
            color: C.mutedLt, display: "flex", alignItems: "center"
          }}>
            <InfoIcon size={13}/>
          </button>
        </div>
        <div className="font-display num" style={{
          fontSize: 18, fontWeight: 600, color: accent,
          letterSpacing: "-0.01em", flexShrink: 0
        }}>
          {fmtFull(value)}
        </div>
      </div>

      {showNote && (
        <div className="font-body fade-in" style={{
          fontSize: 12, color: C.muted, lineHeight: 1.55,
          padding: "8px 12px", background: C.paper,
          borderRadius: 8, marginBottom: 10, fontStyle: "italic"
        }}>
          {item.note}
        </div>
      )}

      <div className={trackClass} style={{ position: "relative" }}>
        <div style={{
          position: "absolute", left: 0, top: "50%", transform: "translateY(-50%)",
          height: 6, width: pct + "%", background: accent,
          borderRadius: 999, pointerEvents: "none", zIndex: 1
        }}/>
        <input type="range" min={item.min} max={item.max} step={item.step}
          value={value} onChange={(e) => onChange(Number(e.target.value))}
          style={{ position: "relative", zIndex: 2 }}/>
      </div>

      <div style={{
        display: "flex", justifyContent: "space-between",
        marginTop: 2, fontSize: 10, color: C.mutedLt,
        fontVariantNumeric: "tabular-nums"
      }}>
        <span>{fmtMoney(item.min)}</span>
        <span>{fmtMoney(item.max)}</span>
      </div>
    </div>
  );
}

// ─── WhatIfPanel ───────────────────────────────────────────
function WhatIfPanel({ values }) {
  const [active, setActive] = useState(null);

  const baseLeftover = useMemo(() => {
    let inc = 0, exp = 0;
    ALL_ITEMS.forEach(item => {
      const v = values[item.id] || 0;
      if (item.catType === "income") inc += v;
      else exp += v;
    });
    return inc - exp;
  }, [values]);

  const projectedLeftover = useMemo(() => {
    if (!active) return baseLeftover;
    const sc = SCENARIOS.find(s => s.id === active);
    if (!sc) return baseLeftover;
    const overrides = sc.impact(values);
    let inc = 0, exp = 0;
    ALL_ITEMS.forEach(item => {
      const v = overrides[item.id] !== undefined ? overrides[item.id] : (values[item.id] || 0);
      if (item.catType === "income") inc += v;
      else exp += v;
    });
    return inc - exp;
  }, [active, values, baseLeftover]);

  const delta = projectedLeftover - baseLeftover;

  return (
    <div className="card-shadow" style={{
      background: C.card, borderRadius: 16, padding: "22px 20px", marginBottom: 20
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
        <AlertCircle size={18} color={C.rust}/>
        <div className="font-display" style={{
          fontSize: 18, fontWeight: 500, color: C.ink, letterSpacing: "-0.01em"
        }}>
          What-If Scenarios
        </div>
      </div>
      <div className="font-body" style={{
        fontSize: 13, color: C.muted, marginBottom: 16, lineHeight: 1.5
      }}>
        Tap one to see the dollar impact. Tap again to clear.
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
        {SCENARIOS.map(s => {
          const SIcon = s.icon;
          const isActive = active === s.id;
          return (
            <button key={s.id} onClick={() => setActive(isActive ? null : s.id)} className="font-body" style={{
              background: isActive ? s.color : C.paper,
              color: isActive ? "#fff" : C.ink,
              border: "1px solid " + (isActive ? s.color : C.line),
              borderRadius: 12, padding: "11px 13px",
              textAlign: "left", cursor: "pointer",
              display: "flex", flexDirection: "column", gap: 4,
              transition: "all 0.2s"
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                <SIcon size={13} color={isActive ? "#fff" : s.color}/>
                <div style={{ fontSize: 12.5, fontWeight: 600, lineHeight: 1.2 }}>{s.name}</div>
              </div>
              <div style={{
                fontSize: 10.5,
                color: isActive ? "rgba(255,255,255,0.85)" : C.muted,
                lineHeight: 1.4
              }}>
                {s.desc}
              </div>
            </button>
          );
        })}
      </div>

      {active && (
        <div className="fade-in" style={{
          background: C.paper, borderRadius: 12, padding: "16px 18px",
          display: "flex", flexDirection: "column", gap: 8
        }}>
          <div className="font-body" style={{
            fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase",
            color: C.muted, fontWeight: 600
          }}>
            Impact on monthly leftover
          </div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 14, flexWrap: "wrap" }}>
            <div>
              <div className="font-display num" style={{
                fontSize: 24, fontWeight: 600, color: C.muted,
                textDecoration: "line-through", letterSpacing: "-0.02em"
              }}>
                {fmtFull(baseLeftover)}
              </div>
              <div className="font-body" style={{ fontSize: 10, color: C.mutedLt }}>was</div>
            </div>
            <ArrowRight size={18} color={C.muted}/>
            <div>
              <div className="font-display num" style={{
                fontSize: 28, fontWeight: 600,
                color: projectedLeftover >= 0 ? C.green : C.rust,
                letterSpacing: "-0.02em"
              }}>
                {fmtFull(projectedLeftover)}
              </div>
              <div className="font-body" style={{ fontSize: 10, color: C.mutedLt, fontWeight: 600 }}>
                ({delta >= 0 ? "+" : ""}{fmtFull(delta)} change)
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── HalalNotes ────────────────────────────────────────────
function HalalNotes({ values }) {
  const flags = [];
  const totalIncome = (values.inc_cc || 0) + (values.inc_kc || 0) +
                       (values.inc_wife || 0) + (values.inc_other || 0);

  if ((values.h_pi || 0) > 0) {
    flags.push({ icon: AlertTriangle, color: C.rust,
      title: "Mortgage = Riba (likely)",
      body: "Traditional mortgages charge interest. Halal alternatives: Guidance Residential, UIF, Ameen Housing. Diminishing musharakah or ijara model." });
  }
  if ((values.c_pay1 || 0) > 0 || (values.c_pay2 || 0) > 0) {
    flags.push({ icon: AlertTriangle, color: C.rust,
      title: "Car payments = Riba",
      body: "Standard auto loans are interest-based. LARIBA offers halal auto financing. Best path: drive what you can buy cash." });
  }
  if ((values.sv_retire || 0) > 0) {
    flags.push({ icon: Check, color: C.green,
      title: "Halal retirement on track",
      body: "Wahed Invest (robo-advisor) and Amana Mutual Funds are Sharia-screened. Avoid traditional 401k unless your employer's options include halal funds." });
  }
  if (totalIncome > 0 && (values.d_sadaqah || 0) > 0) {
    const sadaqahPct = ((values.d_sadaqah || 0) / totalIncome) * 100;

        title: "Sadaqah at " + sadaqahPct.toFixed(1) + "% — your standing pledge",

        title: "Sadaqah at " + sadaqahPct.toFixed(1) + "% — below your 10% pledge",

  if ((values.pr_takaful || 0) > 0) {

      title: "Zakat + Umrah sinking funds active",
      body: "You're treating the deen as a real budget line. Hawl hits ready, Umrah becomes inevitable." });

  if ((values.sv_gold || 0) > 0) {

      title: "Physical gold as halal store",

  if ((values.b_taxes || 0) === 0 && ((values.inc_cc || 0) > 0 || (values.inc_kc || 0) > 0)) {

      title: "No quarterly tax savings set aside",
      body: "Self-employment + federal tax = ~25–30% of net business income. Move the slider so you're not scrambling in April." });

// ─── ExportModal (with native share for iOS) ───────────────
function ExportModal({ values, onClose }) {
  const [copied, setCopied] = useState(false);
  const [shared, setShared] = useState(false);

  const exportText = useMemo(() => {
    let out = "════════════════════════════════════\n";
    out += "TOWNES FAMILY ATLAS · BUDGET SNAPSHOT\n";
    out += "Exported " + new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" }) + "\n";
    out += "════════════════════════════════════\n\n";

    let totalIncome = 0, totalExpense = 0, totalSave = 0;

    CATEGORIES.forEach(cat => {
      const catTotal = cat.items.reduce((s, i) => s + (values[i.id] || 0), 0);
      if (cat.type === "income") totalIncome += catTotal;
      else if (cat.type === "save") totalSave += catTotal;
      else totalExpense += catTotal;

      out += "━━━ " + cat.name.toUpperCase() + " — " + (cat.type === "income" ? "+" : "") + fmtFull(catTotal) + "/mo ━━━\n";
      cat.items.forEach(item => {
        const v = values[item.id] || 0;
        if (v > 0) out += "  " + item.name + ": " + fmtFull(v) + "/mo\n";
      });
      out += "\n";
    });

    out += "════════════════════════════════════\n";
    out += "MONTHLY INCOME:        +" + fmtFull(totalIncome) + "\n";
    out += "MONTHLY EXPENSE:       -" + fmtFull(totalExpense) + "\n";
    out += "MONTHLY SAVING:         " + fmtFull(totalSave) + "\n";
    out += "LEFTOVER:               " + fmtFull(totalIncome - totalExpense - totalSave) + "\n";
    out += "════════════════════════════════════\n";

    return out;
  }, [values]);

  const handleCopy = async () => {
    try {
      await navigator.clipboard.writeText(exportText);
      setCopied(true);
      setTimeout(() => setCopied(false), 2200);
    } catch {
      const ta = document.getElementById("export-ta");
      if (ta) { ta.select(); document.execCommand("copy"); setCopied(true); setTimeout(() => setCopied(false), 2200); }
    }
  };

  const handleShare = async () => {
    if (navigator.share) {
      try {
        await navigator.share({
          title: "Townes Family Atlas — Budget",
          text: exportText
        });
        setShared(true);
        setTimeout(() => setShared(false), 2200);
      } catch (err) {
        // user cancelled or error — silent
      }
    }
  };

  const canShare = typeof navigator !== 'undefined' && !!navigator.share;

  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0,
      background: "rgba(27,25,22,0.65)",
      backdropFilter: "blur(6px)",
      zIndex: 1000, display: "flex",
      alignItems: "center", justifyContent: "center", padding: 16
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: C.cream, borderRadius: 18,
        maxWidth: 720, width: "100%", maxHeight: "90vh",
        display: "flex", flexDirection: "column", overflow: "hidden",
        boxShadow: "0 24px 80px rgba(0,0,0,0.45)"
      }}>
        <div style={{
          padding: "20px 24px",
          borderBottom: "1px solid " + C.line,
          display: "flex", alignItems: "center", justifyContent: "space-between"
        }}>
          <div>
            <div className="font-body" style={{
              fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase",
              color: C.gold, fontWeight: 600, marginBottom: 4
            }}>
              Your Budget Snapshot
            </div>
            <div className="font-display" style={{
              fontSize: 22, fontWeight: 500, color: C.ink, letterSpacing: "-0.01em"
            }}>
              Share with your wife
            </div>
          </div>
          <button onClick={onClose} style={{
            width: 36, height: 36, borderRadius: 9,
            background: "transparent", border: "1px solid " + C.line,
            cursor: "pointer", display: "flex",
            alignItems: "center", justifyContent: "center", color: C.muted
          }}>
            <XIcon size={16}/>
          </button>
        </div>

        <div style={{ padding: "14px 24px", background: C.greenLt, borderBottom: "1px solid " + C.line }}>
          <div className="font-body" style={{ fontSize: 13, color: C.greenDk, lineHeight: 1.55 }}>
            <strong>Tap Share</strong> to send via iMessage, AirDrop, or email. Or copy the text to paste anywhere.
          </div>
        </div>

        <div style={{ flex: 1, overflow: "auto", padding: "16px 24px" }}>
          <textarea id="export-ta" readOnly value={exportText}
            onClick={e => e.target.select()} style={{
              width: "100%", minHeight: 240, maxHeight: "40vh",
              padding: "14px 16px", background: C.paper,
              border: "1px solid " + C.line, borderRadius: 10,
              fontFamily: "ui-monospace, Menlo, monospace",
              fontSize: 11.5, lineHeight: 1.6,
              color: C.ink, resize: "vertical"
            }}/>
        </div>

        <div style={{ padding: "16px 24px 20px", borderTop: "1px solid " + C.line,
          display: "flex", flexDirection: "column", gap: 10 }}>
          {canShare && (
            <button onClick={handleShare} className="font-body" style={{
              width: "100%", padding: "14px 20px",
              background: shared ? C.green : C.green,
              color: "#fff",
              border: "none", borderRadius: 11,
              fontSize: 15, fontWeight: 600, cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center", gap: 8
            }}>
              {shared ? <><Check size={18}/> Shared</> : <><Send size={18}/> Share — iMessage, AirDrop, Mail</>}
            </button>
          )}
          <button onClick={handleCopy} className="font-body" style={{
            width: "100%", padding: "14px 20px",
            background: copied ? C.green : C.ink,
            color: copied ? "#fff" : C.cream,
            border: "none", borderRadius: 11,
            fontSize: 15, fontWeight: 600, cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center", gap: 8
          }}>
            {copied ? <><Check size={18}/> Copied</> : <><Copy size={18}/> Copy text</>}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ──────────────────────────────────────────────
function App() {
  const [values, setValues] = useState(DEFAULTS);
  const [openCats, setOpenCats] = useState({});
  const [activePreset, setActivePreset] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [showExport, setShowExport] = useState(false);
  const saveRef = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const r = await storage.get(STORAGE_KEY);
        if (r && r.value) {
          const parsed = JSON.parse(r.value);
          if (parsed.values) setValues({ ...DEFAULTS, ...parsed.values });
          if (parsed.openCats) setOpenCats(parsed.openCats);
          if (parsed.activePreset) setActivePreset(parsed.activePreset);
        }
      } catch {}
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    if (saveRef.current) clearTimeout(saveRef.current);
    saveRef.current = setTimeout(async () => {
      try {
        await storage.set(STORAGE_KEY, JSON.stringify({ values, openCats, activePreset }));
      } catch {}
    }, 400);
    return () => saveRef.current && clearTimeout(saveRef.current);
  }, [values, openCats, activePreset, loaded]);

  const setVal = (id, v) => {
    setValues(prev => ({ ...prev, [id]: v }));
    setActivePreset(null);
  };

  const toggleCat = (id) => setOpenCats(prev => ({ ...prev, [id]: !prev[id] }));

  const applyPreset = (preset) => {
    setValues(preset.apply());
    setActivePreset(preset.id);
    setOpenCats(prev => ({ ...prev, income: true }));
  };

  const resetAll = () => {
    setValues(DEFAULTS);
    setActivePreset(null);
  };

  const totals = useMemo(() => {
    let inc = 0, exp = 0, sv = 0;
    ALL_ITEMS.forEach(item => {
      const v = values[item.id] || 0;
      if (item.catType === "income") inc += v;
      else if (item.catType === "save") sv += v;
      else exp += v;
    });
    return { totalIncome: inc, totalOut: exp + sv, totalSave: sv };
  }, [values]);

  const leftover = totals.totalIncome - totals.totalOut;

  return (
    <div className="font-body grain" style={{
      minHeight: "100vh", background: C.cream,
      color: C.ink, paddingBottom: 110
    }}>
      <header style={{
        maxWidth: 880, margin: "0 auto",
        padding: "30px 16px 12px", textAlign: "center"
      }}>
        <div style={{
          display: "inline-flex", alignItems: "center", gap: 8,
          padding: "6px 14px", background: C.goldLt,
          border: "1px solid " + C.gold + "44", borderRadius: 999,
          fontSize: 10.5, letterSpacing: "0.16em",
          textTransform: "uppercase", fontWeight: 700,
          color: C.goldDk, marginBottom: 12
        }}>
          <Compass size={11}/> Atlas · Conyers ↔ Decatur
        </div>

        <h1 className="font-display" style={{
          fontSize: "clamp(34px, 7vw, 50px)", fontWeight: 400, color: C.ink,
          margin: 0, letterSpacing: "-0.03em", lineHeight: 1.0, fontStyle: "italic"
        }}>
          Every number,
        </h1>
        <h1 className="font-display" style={{
          fontSize: "clamp(34px, 7vw, 50px)", fontWeight: 500, color: C.green,
          margin: "2px 0 0", letterSpacing: "-0.03em", lineHeight: 1.0
        }}>
          in your hands.
        </h1>

        <p className="font-body" style={{
          fontSize: 14, color: C.inkSoft, maxWidth: 520,
          margin: "14px auto 0", lineHeight: 1.55
        }}>
          Move any slider. Watch the leftover change in real time. Tap a preset for a quick scenario.
          Everything saves automatically.
        </p>
      </header>

      <main style={{ maxWidth: 880, margin: "0 auto", padding: "0 14px" }}>
        <HeroSummary totalIncome={totals.totalIncome} totalExpense={totals.totalOut} leftover={leftover}/>

        <PresetStrip onApply={applyPreset} onReset={resetAll} activePreset={activePreset}/>

        <HalalNotes values={values}/>

        <div className="font-body" style={{
          fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase",
          color: C.muted, fontWeight: 600, marginBottom: 10,
          marginTop: 8, paddingLeft: 4,
          display: "flex", alignItems: "center", gap: 6
        }}>
          <Sliders size={12}/> Every Line · Tap to expand
        </div>

        {CATEGORIES.map(cat => (
          <CategoryCard key={cat.id} cat={cat}
            values={values} setVal={setVal}
            open={!!openCats[cat.id]}
            toggle={() => toggleCat(cat.id)}/>
        ))}

        <div style={{ marginTop: 28 }}>
          <SinkingFundCalendar values={values}/>
        </div>

        <WhatIfPanel values={values}/>

        <div style={{
          background: C.ink, color: C.cream, borderRadius: 18,
          padding: "26px 22px", textAlign: "center",
          marginTop: 20, position: "relative", overflow: "hidden"
        }}>
          <div style={{
            position: "absolute", top: -30, right: -30,
            width: 160, height: 160,
            background: "radial-gradient(circle, " + C.gold + "26 0%, transparent 70%)",
            borderRadius: "50%", pointerEvents: "none"
          }}/>
          <div className="font-display" style={{
            fontSize: 21, fontWeight: 500,
            letterSpacing: "-0.01em", lineHeight: 1.3,
            marginBottom: 10, position: "relative"
          }}>
            "Relationships are way more important than money."
          </div>
          <div className="font-body" style={{
            fontSize: 12, color: "#A89B86",
            letterSpacing: "0.04em", position: "relative"
          }}>
            Your own thesis. Build the budget around the relationships, not the other way.
          </div>
        </div>
      </main>

      <div style={{
        position: "fixed", bottom: 0, left: 0, right: 0,
        background: "rgba(244, 238, 225, 0.94)",
        backdropFilter: "blur(12px)",
        borderTop: "1px solid " + C.line,
        padding: "12px 14px", paddingBottom: "calc(12px + env(safe-area-inset-bottom))",
        zIndex: 100
      }}>
        <div style={{
          maxWidth: 880, margin: "0 auto",
          display: "flex", alignItems: "center", gap: 12,
          justifyContent: "space-between"
        }}>
          <div>
            <div className="font-body" style={{
              fontSize: 10, color: C.muted, letterSpacing: "0.08em",
              textTransform: "uppercase", fontWeight: 600
            }}>
              Monthly leftover
            </div>
            <div className="font-display num" style={{
              fontSize: 21, fontWeight: 600,
              color: leftover >= 0 ? C.green : C.rust,
              letterSpacing: "-0.02em", lineHeight: 1.1
            }}>
              {leftover >= 0 ? "+" : ""}{fmtFull(leftover)}
            </div>
          </div>
          <button onClick={() => setShowExport(true)} className="font-body" style={{
            padding: "12px 18px", background: C.ink,
            color: C.cream, border: "none", borderRadius: 999,
            fontSize: 13, fontWeight: 600, cursor: "pointer",
            display: "flex", alignItems: "center", gap: 8,
            boxShadow: "0 4px 12px " + C.ink + "33", whiteSpace: "nowrap"
          }}>
            <Send size={14}/> Share
          </button>
        </div>
      </div>

      {showExport && <ExportModal values={values} onClose={() => setShowExport(false)}/>}
    </div>
  );
}

// ─── Mount ─────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
